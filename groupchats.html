<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Chats — Dv's Unblocked Games</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root{--bg:#0f0f13;--surface:#1a1a24;--surface2:#13131c;--border:#2e2e3e;--accent:#00d4ff;--text:#e8e8f0;--muted:#7878a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;padding-top:56px;padding-bottom:0;overflow:hidden;height:100vh;}
#bgWrap{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 2s;}
#bgWrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;transform:scale(1.2);}

.gc-layout{position:fixed;top:52px;bottom:58px;left:0;right:0;z-index:1;display:flex;flex-direction:column;overflow:hidden;}
.gc-hero{background:linear-gradient(135deg,#13132a,#1a1a2e);border-bottom:1px solid var(--border);padding:11px 16px;text-align:center;flex-shrink:0;}
.gc-hero h1{font-size:1.1rem;font-weight:900;display:flex;align-items:center;justify-content:center;gap:7px;}
.gc-hero p{color:var(--muted);font-size:.74rem;margin-top:2px;}
.gc-body{flex:1;overflow-y:auto;padding:12px;}

.create-card{background:var(--surface);border:1.5px solid var(--border);border-radius:13px;padding:13px;margin-bottom:12px;}
.create-title{font-weight:900;font-size:.86rem;margin-bottom:10px;display:flex;align-items:center;gap:6px;color:var(--accent);}
.gc-input{width:100%;padding:9px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:.86rem;font-family:'Nunito',sans-serif;outline:none;margin-bottom:8px;}
.gc-input:focus{border-color:var(--accent);}
.member-search-wrap{position:relative;margin-bottom:8px;}
.member-results{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1.5px solid var(--accent);border-radius:0 0 9px 9px;z-index:50;display:none;max-height:180px;overflow-y:auto;}
.member-result-row{display:flex;align-items:center;gap:8px;padding:8px 11px;cursor:pointer;font-size:.84rem;font-weight:700;}
.member-result-row:hover{background:rgba(0,212,255,.1);}
.chips-wrap{display:flex;flex-wrap:wrap;gap:5px;min-height:22px;margin-bottom:8px;}
.chip{display:inline-flex;align-items:center;gap:5px;background:rgba(0,212,255,.12);border:1px solid var(--accent);border-radius:999px;padding:3px 10px;font-size:.74rem;font-weight:900;}
.chip button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.9rem;line-height:1;padding:0 0 0 2px;}
.create-btn{width:100%;padding:10px;background:var(--accent);color:#000;border:none;border-radius:9px;font-weight:900;font-size:.86rem;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
.create-btn:hover{opacity:.9;}

.gc-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:12px;}
.gc-tab{flex:1;padding:9px;background:none;border:none;color:var(--muted);font-weight:900;font-size:.78rem;cursor:pointer;font-family:'Nunito',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;align-items:center;justify-content:center;gap:5px;}
.gc-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.chat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 13px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.chat-card:hover{border-color:rgba(0,212,255,.4);}
.cc-top{display:flex;align-items:center;gap:10px;}
.cc-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cc-info{flex:1;min-width:0;}
.cc-name{font-weight:900;font-size:.88rem;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.cc-preview{font-size:.72rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-time{font-size:.64rem;color:var(--muted);flex-shrink:0;}
.group-badge{font-size:.55rem;background:#e040fb;color:#fff;padding:1px 6px;border-radius:4px;font-weight:900;}
.dm-badge{font-size:.55rem;background:#00d4ff;color:#000;padding:1px 6px;border-radius:4px;font-weight:900;}
.staff-badge{font-size:.55rem;background:#ff6b35;color:#fff;padding:1px 6px;border-radius:4px;font-weight:900;}
.no-chats{text-align:center;color:var(--muted);padding:30px 16px;font-size:.86rem;}

/* CHAT VIEW */
.chat-view{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;font-family:'Nunito',sans-serif;}
.chat-topbar{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;min-height:54px;}
.chat-topbar-info{flex:1;min-width:0;}
.chat-topbar-name{font-weight:900;font-size:.9rem;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.chat-topbar-sub{font-size:.68rem;color:var(--muted);}
.chat-body{flex:1;display:flex;overflow:hidden;position:relative;}
.chat-messages{flex:1;overflow-y:auto;padding:12px 13px;display:flex;flex-direction:column;gap:4px;}

/* MESSAGE BUBBLES */
.msg-row{display:flex;gap:7px;align-items:flex-end;position:relative;}
.msg-row.mine{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.7rem;color:#000;cursor:pointer;}
.msg-av img{width:100%;height:100%;object-fit:cover;}
.msg-content{max-width:72%;display:flex;flex-direction:column;}
.msg-row.mine .msg-content{align-items:flex-end;}
.msg-bubble{padding:8px 12px;border-radius:13px;font-size:.84rem;line-height:1.45;word-break:break-word;position:relative;}
.msg-bubble.theirs{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:3px;}
.msg-bubble.mine-b{background:var(--accent);color:#000;border-bottom-right-radius:3px;}
.msg-sender{font-size:.66rem;font-weight:900;opacity:.7;margin-bottom:2px;}
.msg-time{font-size:.6rem;opacity:.5;margin-top:3px;display:flex;align-items:center;gap:4px;}
.msg-time.mine-t{justify-content:flex-end;}
.msg-reactions{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.reaction-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:2px 7px;cursor:pointer;font-size:.8rem;color:#e8e8f0;font-family:'Nunito',sans-serif;font-weight:700;display:inline-flex;align-items:center;gap:3px;transition:background .1s;}
.reaction-btn.mine-r{background:rgba(0,212,255,.2);border-color:#00d4ff;}
.reply-quote{background:rgba(0,212,255,.08);border-left:3px solid #00d4ff;border-radius:4px;padding:4px 8px;margin-bottom:5px;font-size:.72rem;cursor:pointer;}
.reply-quote-sender{color:#00d4ff;font-weight:900;}
.reply-quote-text{color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.msg-image{max-width:220px;border-radius:10px;cursor:pointer;display:block;margin-top:4px;}

/* LONG PRESS MENU */
.msg-context-menu{position:fixed;z-index:7000;background:#1a1a24;border:2px solid #2e2e3e;border-radius:14px;padding:8px;box-shadow:0 8px 32px rgba(0,0,0,.9);min-width:180px;font-family:'Nunito',sans-serif;}
.ctx-emoji-row{display:flex;gap:5px;padding:6px 4px;border-bottom:1px solid #2e2e3e;margin-bottom:6px;flex-wrap:wrap;}
.ctx-emoji-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px 5px;border-radius:8px;}
.ctx-emoji-btn:hover{background:rgba(255,255,255,.1);}
.ctx-action{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:.84rem;font-weight:700;color:#e8e8f0;}
.ctx-action:hover{background:rgba(255,255,255,.07);}
.ctx-action.danger{color:#ff4757;}

/* REPLY BAR */
.reply-bar{background:#13132a;border-top:2px solid #00d4ff;padding:7px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.reply-bar-text{flex:1;min-width:0;}
.reply-bar-label{font-size:.66rem;color:#00d4ff;font-weight:900;}
.reply-bar-preview{font-size:.74rem;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* INPUT BAR */
.chat-input-bar{padding:8px 10px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-shrink:0;}
.chat-input{flex:1;padding:9px 13px;background:var(--bg);border:1.5px solid var(--border);border-radius:999px;color:var(--text);font-size:.84rem;font-family:'Nunito',sans-serif;outline:none;}
.chat-input:focus{border-color:var(--accent);}
.icon-btn{width:34px;height:34px;background:rgba(255,255,255,.07);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--muted);}
.icon-btn:hover{background:rgba(255,255,255,.15);color:var(--text);}
.send-btn{width:36px;height:36px;background:var(--accent);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.disabled-input{opacity:.5;cursor:not-allowed;}

/* MEMBERS PANEL */
.members-panel{width:0;overflow:hidden;transition:width .2s;background:var(--surface);border-left:1px solid var(--border);flex-shrink:0;}
.members-panel.open{width:200px;overflow-y:auto;}
.mp-title{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;border-bottom:1px solid var(--border);font-weight:900;font-size:.84rem;position:sticky;top:0;background:var(--surface);z-index:5;}
.mp-member{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);}
.mp-av{width:30px;height:30px;border-radius:50%;overflow:hidden;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.72rem;color:#000;flex-shrink:0;}
.mp-av img{width:100%;height:100%;object-fit:cover;}

/* IMAGE VIEWER */
.img-viewer{position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;}
.img-viewer img{max-width:95vw;max-height:90vh;border-radius:10px;object-fit:contain;}
.img-viewer-close{position:absolute;top:16px;right:16px;background:#2e2e3e;border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* TOAST */
.gc-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:11px 20px;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.86rem;z-index:9999;max-width:300px;width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;transition:opacity .4s;background:#1a1a24;border:2px solid #00d4ff;color:#e8e8f0;}
</style>

<script>
var me = null;
var currentTab = 'groups';
var selectedMembers = [];
var allUsers = [];
var allGroupChats = [];
var allDMs = [];
var unsubGroups = null;
var unsubDMs = null;
var unsubMsgs = null;
var currentChatId = null;
var membersOpen = false;
var _replyTo = null;
var ROLE_RANK = {owner:5,developer:4,admin:3,mod:2,helper:1,user:0};
var DEFAULT_REACTIONS = ['👍','❤️','😂','😮','😢','🔥','💯','🎮'];

// ── UTILS ──
function timeAgo(ts){
  if(!ts)return'';
  var d=(Date.now()-(ts.toMillis?ts.toMillis():ts))/1000;
  if(d<60)return'now';if(d<3600)return Math.floor(d/60)+'m';
  if(d<86400)return Math.floor(d/3600)+'h';return Math.floor(d/86400)+'d';
}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,color){
  color=color||'#00d4ff';
  var t=document.createElement('div');t.className='gc-toast';t.style.borderColor=color;t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){if(t.parentNode)t.remove();},400);},3000);
}

function doLogout(){
  try{localStorage.removeItem('dvs_uid');localStorage.removeItem('dvs_ts');}catch(e){}
  auth.signOut().then(function(){location.href='index.html';});
}
function getUserRole(u){
  if(!u)return'user';
  if(u.role==='owner'||u.isOwner)return'owner';
  if(u.role==='developer'||u.isDeveloper)return'developer';
  if(u.role==='admin'||u.isAdmin)return'admin';
  if(u.role==='mod'||u.isMod)return'mod';
  if(u.role==='helper'||u.isHelper)return'helper';
  return'user';
}

// ── AUTH ──
auth.onAuthStateChanged(function(firebaseUser){
  if(!firebaseUser){
    var saved=null;
    try{var uid=localStorage.getItem('dvs_uid');var ts=parseInt(localStorage.getItem('dvs_ts')||'0');if(uid&&Date.now()-ts<48*3600*1000)saved=uid;}catch(e){}
    if(saved){
      db.collection('users').doc(saved).get().then(function(doc){
        if(doc.exists){init(Object.assign({uid:saved},doc.data()));}else{location.href='index.html';}
      }).catch(function(){location.href='index.html';});
    }else{location.href='index.html';}
    return;
  }
  db.collection('users').doc(firebaseUser.uid).get().then(function(doc){
    if(!doc.exists){location.href='index.html';return;}
    init(Object.assign({uid:firebaseUser.uid},doc.data()));
  });
});

function init(user){
  me=user;
  var av=document.getElementById('navAvatar');
  av.innerHTML=me.pfp?'<img src="'+me.pfp+'" style="width:100%;height:100%;object-fit:cover;">':me.username[0].toUpperCase();
  document.getElementById('navUsername').textContent=me.username;
  var bg=document.getElementById('bgWrap');if(bg)bg.style.opacity='0.18';
  loadAllUsers();
  startListeners();
}

function loadAllUsers(){
  db.collection('users').get().then(function(snap){
    allUsers=[];
    snap.forEach(function(doc){
      if(doc.id===me.uid)return;
      var d=doc.data();
      allUsers.push({uid:doc.id,username:d.username||'?',usernameLower:(d.usernameLower||''),pfp:d.pfp||null});
    });
  });
}

// ── LISTENERS ──
function startListeners(){
  var myRank=ROLE_RANK[getUserRole(me)]||0;
  if(unsubGroups)unsubGroups();
  if(myRank>=2){
    unsubGroups=db.collection('chats').where('isGroup','==',true).limit(100)
      .onSnapshot(function(snap){
        allGroupChats=[];snap.forEach(function(doc){allGroupChats.push(Object.assign({id:doc.id},doc.data()));});
        sortByTime(allGroupChats);if(currentTab==='groups')renderChatList(allGroupChats);
      },function(e){console.warn(e);});
  }else{
    unsubGroups=db.collection('chats').where('memberUids','array-contains',me.uid).where('isGroup','==',true).limit(100)
      .onSnapshot(function(snap){
        allGroupChats=[];snap.forEach(function(doc){allGroupChats.push(Object.assign({id:doc.id},doc.data()));});
        sortByTime(allGroupChats);if(currentTab==='groups')renderChatList(allGroupChats);
      },function(e){console.warn(e);});
  }
  if(unsubDMs)unsubDMs();
  unsubDMs=db.collection('chats').where('memberUids','array-contains',me.uid).where('isGroup','==',false).limit(100)
    .onSnapshot(function(snap){
      allDMs=[];snap.forEach(function(doc){allDMs.push(Object.assign({id:doc.id},doc.data()));});
      sortByTime(allDMs);if(currentTab==='dms')renderChatList(allDMs);
    },function(e){console.warn(e);});
}

function sortByTime(arr){
  arr.sort(function(a,b){
    var at=a.lastMsgTs?a.lastMsgTs.toMillis?a.lastMsgTs.toMillis():a.lastMsgTs:0;
    var bt=b.lastMsgTs?b.lastMsgTs.toMillis?b.lastMsgTs.toMillis():b.lastMsgTs:0;
    return bt-at;
  });
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.gc-tab').forEach(function(b){b.classList.remove('active');});
  var tb=document.getElementById('tab-'+tab);if(tb)tb.classList.add('active');
  renderChatList(tab==='groups'?allGroupChats:allDMs);
}

// ── CHAT LIST ──
function renderChatList(chats){
  var list=document.getElementById('chatList');if(!list)return;
  if(!chats||!chats.length){
    list.innerHTML='<div class="no-chats"><svg width="38" height="38" fill="var(--muted)" viewBox="0 0 24 24" style="display:block;margin:0 auto 10px;"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 11H7V9h2v2zm4 0h-2V9h2v2zm4 0h-2V9h2v2z"/></svg>'+(currentTab==='groups'?'No group chats yet. Create one above!':'No DMs yet. Go to Friends to start one.')+'</div>';
    return;
  }
  list.innerHTML='';
  chats.forEach(function(chat){list.appendChild(makeChatCard(chat));});
}

// ── OPEN CHAT ──
function openChat(chatId){
  currentChatId=chatId;
  db.collection('chats').doc(chatId).get().then(function(doc){
    if(!doc.exists){showToast('Chat not found!','#ff4757');return;}
    buildChatView(Object.assign({id:chatId},doc.data()));

function closeChatView(){
  var v=document.getElementById('activeChatView');if(v)v.remove();
  if(unsubMsgs){unsubMsgs();unsubMsgs=null;}
  currentChatId=null;membersOpen=false;_replyTo=null;
}

function toggleMembersPanel(){
  membersOpen=!membersOpen;
  var mp=document.getElementById('membersPanel');if(mp)mp.classList.toggle('open',membersOpen);
}

// ── MEMBERS PANEL ──
function renderMembersList(members,createdBy,chatId){
  var list=document.getElementById('membersList');if(!list)return;
  var myRank=ROLE_RANK[getUserRole(me)]||0;
  list.innerHTML='';
  members.forEach(function(m){
    var isCreator=m.uid===createdBy;var isMe=m.uid===me.uid;
    var canRemove=(me.uid===createdBy||myRank>=3)&&!isMe&&!isCreator;
    var row=document.createElement('div');row.className='mp-member';
    row.innerHTML=
      '<div class="mp-av">'+(m.pfp?'<img src="'+m.pfp+'">':m.username[0].toUpperCase())+'</div>'+
      '<div style="flex:1;min-width:0;"><div style="font-weight:900;font-size:.8rem;">@'+escHtml(m.username||'?')+
        (isCreator?'<span style="font-size:.54rem;background:#FFD700;color:#000;padding:1px 4px;border-radius:3px;margin-left:3px;">Host</span>':'')+
        (isMe?'<span style="font-size:.54rem;color:var(--accent);margin-left:3px;">(you)</span>':'')+
      '</div></div>'+
      (canRemove?'<button onclick="removeMemberFromGroup(\''+chatId+'\',\''+m.uid+'\',\''+escHtml(m.username)+'\')" style="background:none;border:none;cursor:pointer;color:#ff4757;padding:3px;"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>':'');
    list.appendChild(row);
  });
}

function removeMemberFromGroup(chatId,uid,username){
  if(!confirm('Remove @'+username+'?'))return;
  db.collection('chats').doc(chatId).get().then(function(doc){
    if(!doc.exists)return;
    var d=doc.data();
    var newMembers=(d.members||[]).filter(function(m){return m.uid!==uid;});
    var newUids=(d.memberUids||[]).filter(function(id){return id!==uid;});
    var newNames=(d.memberNames||[]).filter(function(n){return n!==username;});
    db.collection('chats').doc(chatId).update({members:newMembers,memberUids:newUids,memberNames:newNames})
      .then(function(){renderMembersList(newMembers,d.createdBy,chatId);showToast('@'+username+' removed.');});
  });
}

function staffJoinGroup(chatId){
  if(!confirm('Join this group as staff?'))return;
  db.collection('chats').doc(chatId).update({
    memberUids:firebase.firestore.FieldValue.arrayUnion(me.uid),
    memberNames:firebase.firestore.FieldValue.arrayUnion(me.username),
    members:firebase.firestore.FieldValue.arrayUnion({uid:me.uid,username:me.username,pfp:me.pfp||null})
  }).then(function(){showToast('Joined!');closeChatView();setTimeout(function(){openChat(chatId);},300);});
}

// ── MESSAGES ──
function listenMessages(chatId,isGroup,myRank){
  if(unsubMsgs)unsubMsgs();
  unsubMsgs=db.collection('chats').doc(chatId).collection('messages')
    .orderBy('ts','asc').limit(200)
    .onSnapshot(function(snap){
      var container=document.getElementById('chatMsgsContainer');if(!container)return;
      var wasAtBottom=container.scrollHeight-container.scrollTop-container.clientHeight<60;
      container.innerHTML='';
      snap.forEach(function(msgDoc){
        container.appendChild(makeMsgBubble(Object.assign({id:msgDoc.id},msgDoc.data()),chatId,isGroup,myRank));
      });
      if(wasAtBottom)container.scrollTop=container.scrollHeight;
    },function(e){console.warn(e);});
}

// ── LONG PRESS / CONTEXT MENU ──
var _pressTimer=null;
var _pressTarget=null;

function attachLongPress(el,msgData,chatId,myRank){
  function startPress(e){
    _pressTimer=setTimeout(function(){showMsgContextMenu(msgData,chatId,myRank,el);},450);
  }
  function cancelPress(){clearTimeout(_pressTimer);}
  el.addEventListener('touchstart',startPress,{passive:true});
  el.addEventListener('touchend',cancelPress);
  el.addEventListener('touchmove',cancelPress);
  el.addEventListener('mousedown',startPress);
  el.addEventListener('mouseup',cancelPress);
  el.addEventListener('mouseleave',cancelPress);
  el.addEventListener('contextmenu',function(e){e.preventDefault();showMsgContextMenu(msgData,chatId,myRank,el);});
}

function showMsgContextMenu(m,chatId,myRank,anchorEl){
  var ex=document.getElementById('msgCtxMenu');if(ex)ex.remove();
  var isMine=m.senderUid===me.uid;
  var canDel=isMine||(myRank>=2);
  var menu=document.createElement('div');
  menu.id='msgCtxMenu';menu.className='msg-context-menu';

  // Emoji quick-react row
  var emojiRow=document.createElement('div');emojiRow.className='ctx-emoji-row';
  DEFAULT_REACTIONS.forEach(function(emoji){
    var btn=document.createElement('button');btn.className='ctx-emoji-btn';btn.textContent=emoji;
    btn.onclick=function(){addReaction(chatId,m.id,emoji);menu.remove();};
    emojiRow.appendChild(btn);
  });
  // Custom emoji button
  var customBtn=document.createElement('button');customBtn.className='ctx-emoji-btn';customBtn.textContent='✏️';
  customBtn.title='Custom emoji';
  customBtn.onclick=function(){
    var emoji=prompt('Enter custom emoji or text reaction:','');
    if(emoji&&emoji.trim()){addReaction(chatId,m.id,emoji.trim());menu.remove();}
  };
  emojiRow.appendChild(customBtn);
  menu.appendChild(emojiRow);

  // Actions
  function addAction(icon,label,fn,danger){
    var row=document.createElement('div');row.className='ctx-action'+(danger?' danger':'');
    row.innerHTML=icon+' <span>'+label+'</span>';
    row.onclick=function(){fn();menu.remove();};
    menu.appendChild(row);
  }

  if(!m.deleted){
    addAction('↩','Reply to message',function(){
      setReply(m.id,m.senderUsername,m.type==='image'?'[Image]':m.text);
    });
    if(isMine){
      addAction('📋','Copy text',function(){
        navigator.clipboard&&navigator.clipboard.writeText(m.text||'').catch(function(){});
        showToast('Copied!');
      });
    }
    if(canDel)addAction('🗑','Delete message',function(){deleteMsg(chatId,m.id);},true);
  }

  // Position
  var rect=anchorEl.getBoundingClientRect();
  var top=rect.top-10;
  if(top+280>window.innerHeight)top=rect.bottom-280;
  if(top<10)top=10;
  menu.style.top=top+'px';
  menu.style.left=Math.min(Math.max(rect.left,8),window.innerWidth-200)+'px';

  document.body.appendChild(menu);
  setTimeout(function(){
    document.addEventListener('click',function closeMenu(e){
      if(!menu.contains(e.target)){menu.remove();document.removeEventListener('click',closeMenu);}
    });
  },100);
}

// ── BUILD MESSAGE BUBBLE ──
function makeMsgBubble(m,chatId,isGroup,myRank){
  var isMine=m.senderUid===me.uid;
  var row=document.createElement('div');
  row.className='msg-row'+(isMine?' mine':'');

  if(m.deleted){
    row.innerHTML='<div style="color:var(--muted);font-style:italic;font-size:.74rem;text-align:'+(isMine?'right':'left')+';width:100%;padding:2px 36px;">Message deleted</div>';
    return row;
  }

  // Avatar
  var avHtml='<div class="msg-av">'+(m.senderPfp?'<img src="'+m.senderPfp+'" alt="">':((m.senderUsername||'?')[0].toUpperCase()))+'</div>';

  // Reply quote
  var replyHtml='';
  if(m.replyTo){
    replyHtml='<div class="reply-quote" onclick="scrollToMsg(\''+m.replyTo.msgId+'\')">'+
      '<div class="reply-quote-sender">↩ @'+escHtml(m.replyTo.senderUsername||'?')+'</div>'+
      '<div class="reply-quote-text">'+escHtml((m.replyTo.text||'[Image]').substring(0,60))+'</div>'+
    '</div>';
  }

  // Content
  var contentHtml='';
  if(m.type==='image'){
    contentHtml='<img class="msg-image" src="'+escHtml(m.imageUrl||'')+'" alt="image" onclick="openImageViewer(\''+escHtml(m.imageUrl||'')+'\')"/>';
  }else{
    contentHtml='<div>'+escHtml(m.text||'')+'</div>';
  }

  // Reactions
  var reactions=m.reactions||{};
  var reactHtml='';
  if(Object.keys(reactions).length){
    reactHtml='<div class="msg-reactions">';
    Object.keys(reactions).forEach(function(emoji){
      var users=reactions[emoji]||[];
      if(!users.length)return;
      var myReacted=users.includes(me.uid);
      reactHtml+='<button class="reaction-btn'+(myReacted?' mine-r':'')+'" onclick="addReaction(\''+chatId+'\',\''+m.id+'\',\''+escHtml(emoji)+'\')">'+
        escHtml(emoji)+' <span style="font-size:.7rem;">'+users.length+'</span></button>';
    });
    reactHtml+='</div>';
  }

  // Time + delete
  var timeHtml='<div class="msg-time'+(isMine?' mine-t':'')+'">'+timeAgo(m.ts)+'</div>';

  var bubbleHtml=
    '<div class="msg-bubble '+(isMine?'mine-b':'theirs')+'">'+
      (isGroup&&!isMine?'<div class="msg-sender">@'+escHtml(m.senderUsername||'?')+'</div>':'')+
      replyHtml+
      contentHtml+
      timeHtml+
    '</div>'+
    reactHtml;

  var contentEl=document.createElement('div');
  contentEl.className='msg-content';
  contentEl.innerHTML=bubbleHtml;
  contentEl.setAttribute('data-msgid',m.id);

  attachLongPress(contentEl,m,chatId,myRank);

  if(isMine){row.appendChild(contentEl);row.appendChild(document.createRange().createContextualFragment(avHtml));}
  else{row.appendChild(document.createRange().createContextualFragment(avHtml));row.appendChild(contentEl);}
  return row;
}

function scrollToMsg(msgId){
  var el=document.querySelector('[data-msgid="'+msgId+'"]');
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.background='rgba(0,212,255,.15)';setTimeout(function(){el.style.background='';},1500);}
}

// ── REACTIONS ──
function addReaction(chatId,msgId,emoji){
  if(!me||!chatId||!msgId)return;
  var ref=db.collection('chats').doc(chatId).collection('messages').doc(msgId);
  ref.get().then(function(doc){
    if(!doc.exists)return;
    var reactions=Object.assign({},doc.data().reactions||{});
    var users=reactions[emoji]?reactions[emoji].slice():[];
    if(users.includes(me.uid)){users=users.filter(function(id){return id!==me.uid;});}
    else{users.push(me.uid);}
    if(users.length===0){delete reactions[emoji];}else{reactions[emoji]=users;}
    ref.update({reactions:reactions});
  });
}

// ── REPLY ──
function setReply(msgId,senderUsername,text){
  _replyTo={msgId:msgId,senderUsername:senderUsername,text:text};
  var bar=document.getElementById('replyBar');
  var label=document.getElementById('replyBarLabel');
  var preview=document.getElementById('replyBarPreview');
  if(bar)bar.style.display='flex';
  if(label)label.textContent='↩ Replying to @'+(senderUsername||'?');
  if(preview)preview.textContent=(text||'[Image]').substring(0,60);
  var inp=document.getElementById('chatMsgInput');if(inp)inp.focus();
}

function clearReply(){
  _replyTo=null;
  var bar=document.getElementById('replyBar');if(bar)bar.style.display='none';
}

// ── SEND MESSAGE ──
function sendMsg(){
  var inp=document.getElementById('chatMsgInput');
  var text=(inp.value||'').trim();
  if(!text||!currentChatId)return;
  inp.value='';
  var msgData={
    senderUid:me.uid,senderUsername:me.username,senderPfp:me.pfp||null,
    type:'text',text:text,deleted:false,reactions:{},
    replyTo:_replyTo||null,
    ts:firebase.firestore.FieldValue.serverTimestamp()
  };
  clearReply();
  db.collection('chats').doc(currentChatId).collection('messages').add(msgData);
  db.collection('chats').doc(currentChatId).update({
    lastMsg:text.substring(0,80),lastMsgTs:firebase.firestore.FieldValue.serverTimestamp()
  });
}

function deleteMsg(chatId,msgId){
  db.collection('chats').doc(chatId).collection('messages').doc(msgId).update({deleted:true,text:'',imageUrl:'',reactions:{}});
}

// ── IMAGE PICKER ──
function openImagePicker(){
  if(!currentChatId){showToast('No chat open!','#ff4757');return;}
  var inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.style.display='none';
  inp.onchange=function(){
    var file=inp.files[0];if(!file)return;
    if(file.size>4*1024*1024){showToast('Image must be under 4MB!','#ff4757');return;}
    var reader=new FileReader();
    reader.onload=function(e){sendImageMessage(currentChatId,e.target.result,file.type);};
    reader.readAsDataURL(file);
  };
  document.body.appendChild(inp);inp.click();setTimeout(function(){inp.remove();},5000);
}

function sendImageMessage(chatId,dataUrl,mimeType){
  if(!me||!chatId)return;
  var msgData={
    senderUid:me.uid,senderUsername:me.username,senderPfp:me.pfp||null,
    type:'image',imageUrl:dataUrl,mimeType:mimeType||'image/png',
    text:'',deleted:false,reactions:{},
    replyTo:_replyTo||null,
    ts:firebase.firestore.FieldValue.serverTimestamp()
  };
  clearReply();
  db.collection('chats').doc(chatId).collection('messages').add(msgData);
  db.collection('chats').doc(chatId).update({lastMsg:'📷 Image',lastMsgTs:firebase.firestore.FieldValue.serverTimestamp()});
}

// ── IMAGE VIEWER ──
function openImageViewer(url){
  var ex=document.getElementById('imgViewer');if(ex)ex.remove();
  var v=document.createElement('div');v.id='imgViewer';v.className='img-viewer';
  v.innerHTML='<img src="'+escHtml(url)+'" alt="image"><button class="img-viewer-close" onclick="document.getElementById(\'imgViewer\').remove()">×</button>';
  v.onclick=function(e){if(e.target===v)v.remove();};
  document.body.appendChild(v);
}

// ── CREATE GROUP ──
function searchMembers(q){
  var res=document.getElementById('memberResults');
  q=(q||'').toLowerCase().trim();
  if(q.length<1){res.style.display='none';return;}
  var matches=allUsers.filter(function(u){
    return u.usernameLower.includes(q)&&!selectedMembers.find(function(m){return m.uid===u.uid;});
  }).slice(0,7);
  if(!matches.length){res.style.display='none';return;}
  res.style.display='block';
  res.innerHTML=matches.map(function(u){
    return'<div class="member-result-row" onclick="addMember(\''+u.uid+'\',\''+escHtml(u.username)+'\',\''+escHtml(u.pfp||'')+'\')">'+
      '<div style="width:26px;height:26px;border-radius:50%;background:var(--accent);color:#000;font-weight:900;font-size:.68rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;">'+
        (u.pfp?'<img src="'+u.pfp+'" style="width:100%;height:100%;object-fit:cover;">':u.username[0].toUpperCase())+
      '</div>@'+escHtml(u.username)+'</div>';
  }).join('');
}

function addMember(uid,username,pfp){
  if(selectedMembers.find(function(m){return m.uid===uid;}))return;
  selectedMembers.push({uid:uid,username:username,pfp:pfp||null});
  document.getElementById('memberSearch').value='';
  document.getElementById('memberResults').style.display='none';
  renderChips();
}
function removeMember(uid){selectedMembers=selectedMembers.filter(function(m){return m.uid!==uid;});renderChips();}
function renderChips(){
  var wrap=document.getElementById('memberChips');
  if(!selectedMembers.length){wrap.innerHTML='<span style="font-size:.74rem;color:var(--muted);">No members added yet</span>';return;}
  wrap.innerHTML=selectedMembers.map(function(m){
    return'<div class="chip">'+
      '<div style="width:17px;height:17px;border-radius:50%;overflow:hidden;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:900;color:#000;">'+
        (m.pfp?'<img src="'+m.pfp+'" style="width:100%;height:100%;object-fit:cover;">':m.username[0].toUpperCase())+
      '</div>@'+escHtml(m.username)+'<button onclick="removeMember(\''+m.uid+'\')">×</button></div>';
  }).join('');
}

function createGroup(){
  var name=(document.getElementById('gcNameInput').value||'').trim();
  if(!name){showToast('Enter a group name!','#ff4757');return;}
  if(!selectedMembers.length){showToast('Add at least 1 member!','#ff4757');return;}
  var members=[{uid:me.uid,username:me.username,pfp:me.pfp||null}].concat(selectedMembers);
  var memberUids=members.map(function(m){return m.uid;});
  var memberNames=members.map(function(m){return m.username;});
  db.collection('chats').add({
    name:name,isGroup:true,members:members,memberUids:memberUids,memberNames:memberNames,
    createdBy:me.uid,createdByUsername:me.username,
    lastMsg:'',lastMsgTs:firebase.firestore.FieldValue.serverTimestamp(),
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(ref){
    members.forEach(function(m){
      if(m.uid!==me.uid){
        db.collection('users').doc(m.uid).collection('notifications').add({
          message:'📢 @'+me.username+' added you to group "'+name+'"!',
          type:'info',read:false,ts:firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    });
    document.getElementById('gcNameInput').value='';selectedMembers=[];renderChips();
    showToast('"'+name+'" created!');openChat(ref.id);
  }).catch(function(e){showToast('Error: '+e.message,'#ff4757');});
}

document.addEventListener('click',function(e){
  var res=document.getElementById('memberResults');
  if(res&&!res.contains(e.target)&&e.target.id!=='memberSearch')res.style.display='none';
});
</script>
