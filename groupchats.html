<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Chats — Dv's Unblocked Games</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root{--bg:#0f0f13;--surface:#1a1a24;--surface2:#13131c;--border:#2e2e3e;--accent:#00d4ff;--text:#e8e8f0;--muted:#7878a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;padding-top:56px;padding-bottom:62px;}

/* ── SPACE BG ── */
#bgWrap{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 2s;}
#bgWrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;transform:scale(1.2);}

/* ── LAYOUT ── */
.gc-wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:14px 12px 80px;}

/* ── HEADER ── */
.gc-hero{background:linear-gradient(135deg,#13132a,#1a1a2e);border-bottom:1px solid var(--border);padding:16px;text-align:center;position:relative;z-index:1;}
.gc-hero h1{font-size:1.3rem;font-weight:900;display:flex;align-items:center;justify-content:center;gap:8px;}
.gc-hero p{color:var(--muted);font-size:.82rem;margin-top:4px;}

/* ── CREATE FORM ── */
.create-form{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
.create-form h3{font-size:.9rem;font-weight:900;margin-bottom:11px;color:var(--accent);display:flex;align-items:center;gap:7px;}
.cf-input{width:100%;padding:9px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:.86rem;font-family:'Nunito',sans-serif;outline:none;margin-bottom:8px;}
.cf-input:focus{border-color:var(--accent);}
.member-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:24px;}
.chip{background:rgba(0,212,255,.12);border:1px solid var(--accent);color:var(--accent);padding:3px 9px;border-radius:999px;font-size:.74rem;font-weight:900;display:flex;align-items:center;gap:5px;}
.chip button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.8rem;padding:0;line-height:1;}
.member-search-wrap{position:relative;}
.member-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1e1e2e;border:1.5px solid var(--border);border-radius:10px;z-index:20;max-height:180px;overflow-y:auto;}
.member-result-row{padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:9px;font-size:.84rem;font-weight:700;}
.member-result-row:hover{background:rgba(0,212,255,.08);}
.create-btn{width:100%;padding:10px;background:var(--accent);color:#000;border:none;border-radius:10px;font-weight:900;font-size:.88rem;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
.create-btn:hover{opacity:.9;}

/* ── TABS ── */
.tab-bar{display:flex;border-bottom:2px solid var(--border);margin-bottom:14px;}
.tab-btn{flex:1;padding:9px;background:none;border:none;color:var(--muted);font-weight:900;font-size:.82rem;cursor:pointer;font-family:'Nunito',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;align-items:center;justify-content:center;gap:5px;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── CHAT LIST ── */
.chat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:13px;padding:12px 14px;margin-bottom:9px;cursor:pointer;transition:border-color .15s,transform .1s;}
.chat-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.chat-card.has-unread{border-color:var(--accent);}
.cc-top{display:flex;align-items:center;gap:10px;}
.cc-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1rem;flex-shrink:0;overflow:hidden;}
.cc-info{flex:1;min-width:0;}
.cc-name{font-weight:900;font-size:.92rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.cc-preview{font-size:.76rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-time{font-size:.68rem;color:var(--muted);flex-shrink:0;}
.unread-dot{width:9px;height:9px;background:var(--accent);border-radius:50%;flex-shrink:0;}
.no-chats{text-align:center;color:var(--muted);padding:32px 16px;font-size:.88rem;}

/* ── CHAT VIEW ── */
.chat-view{position:fixed;inset:0;z-index:2000;background:var(--bg);display:flex;flex-direction:column;font-family:'Nunito',sans-serif;}
.chat-topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.chat-topbar-info{flex:1;min-width:0;}
.chat-topbar-name{font-weight:900;font-size:.96rem;display:flex;align-items:center;gap:7px;}
.chat-topbar-members{font-size:.72rem;color:var(--muted);margin-top:1px;}
.chat-messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.msg-row{display:flex;gap:8px;align-items:flex-end;}
.msg-row.mine{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.72rem;color:#000;}
.msg-av img{width:100%;height:100%;object-fit:cover;}
.msg-bubble{max-width:72%;padding:9px 13px;border-radius:14px;font-size:.86rem;line-height:1.45;word-break:break-word;}
.msg-bubble.theirs{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg-bubble.mine-b{background:var(--accent);color:#000;border-bottom-right-radius:4px;}
.msg-sender{font-size:.66rem;font-weight:900;margin-bottom:3px;opacity:.8;}
.msg-time{font-size:.62rem;opacity:.55;margin-top:3px;}
.msg-deleted{font-style:italic;opacity:.4;font-size:.78rem;}
.chat-input-bar{padding:10px 12px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0;}
.chat-input{flex:1;padding:10px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:999px;color:var(--text);font-size:.86rem;font-family:'Nunito',sans-serif;outline:none;}
.chat-input:focus{border-color:var(--accent);}
.send-btn{width:38px;height:38px;background:var(--accent);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:hover{opacity:.85;}

/* ── MEMBERS PANEL ── */
.members-panel{position:absolute;top:0;right:0;bottom:0;width:260px;background:#13131c;border-left:1px solid var(--border);overflow-y:auto;z-index:10;padding:14px;transform:translateX(100%);transition:transform .25s;}
.members-panel.open{transform:translateX(0);}
.mp-title{font-weight:900;font-size:.9rem;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.mp-member{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.mp-av{width:32px;height:32px;border-radius:50%;overflow:hidden;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:.78rem;flex-shrink:0;}
.mp-av img{width:100%;height:100%;object-fit:cover;}

/* ── GROUP BADGE ── */
.group-badge{font-size:.6rem;background:#e040fb;color:#fff;padding:2px 7px;border-radius:4px;font-weight:900;}
.dm-badge{font-size:.6rem;background:#00d4ff;color:#000;padding:2px 7px;border-radius:4px;font-weight:900;}
</style>
</head>

<div class="gc-wrap">

<!-- ═══════ SCRIPTS ═══════ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
var me = null;
var currentTab = 'groups';
var selectedMembers = []; // [{uid, username, pfp}]
var allUsers = [];
var unsubChats = null;
var unsubMsgs = null;
var currentChatId = null;
var membersOpen = false;

// ── AUTH ──
function doLogout(){auth.signOut().then(function(){location.href='index.html';});}

auth.onAuthStateChanged(function(firebaseUser){
  if(!firebaseUser){location.href='index.html';return;}
  db.collection('users').doc(firebaseUser.uid).get().then(function(doc){
    if(!doc.exists){location.href='index.html';return;}
    me=Object.assign({uid:firebaseUser.uid},doc.data());
    renderNavUser(me);
    loadAllUsers();
    listenChats();
    // Show space bg
    var bg=document.getElementById('bgWrap');if(bg)bg.style.opacity='0.18';
  });
});

function renderNavUser(user){
  var av=document.getElementById('navAvatar');
  av.innerHTML=user.pfp?'<img src="'+user.pfp+'" style="width:100%;height:100%;object-fit:cover;">':user.username[0].toUpperCase();
  document.getElementById('navUsername').textContent=user.username;
}

// ── LOAD ALL USERS (for member search) ──
function loadAllUsers(){
  db.collection('users').get().then(function(snap){
    allUsers=[];
    snap.forEach(function(doc){
      var d=doc.data();
      if(doc.id!==me.uid)allUsers.push({uid:doc.id,username:d.username,usernameLower:d.usernameLower||d.username.toLowerCase(),pfp:d.pfp||null});
    });
  });
}

// ── MEMBER SEARCH ──
function searchMembers(q){
  var res=document.getElementById('memberResults');
  q=(q||'').toLowerCase().trim();
  if(!q){res.style.display='none';return;}
  var matches=allUsers.filter(function(u){
    return u.usernameLower.includes(q)&&!selectedMembers.find(function(m){return m.uid===u.uid;});
  }).slice(0,6);
  if(!matches.length){res.style.display='none';return;}
  res.style.display='block';
  res.innerHTML=matches.map(function(u){
    return'<div class="member-result-row" onclick="addMember(\''+u.uid+'\',\''+escHtml(u.username)+'\',\''+escHtml(u.pfp||'')+'\')">'+
      '<div style="width:28px;height:28px;border-radius:50%;background:var(--accent);color:#000;font-weight:900;font-size:.72rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;">'+
        (u.pfp?'<img src="'+u.pfp+'" style="width:100%;height:100%;object-fit:cover;">':u.username[0].toUpperCase())+
      '</div>'+
      '@'+escHtml(u.username)+
    '</div>';
  }).join('');
}

function addMember(uid,username,pfp){
  if(selectedMembers.find(function(m){return m.uid===uid;}))return;
  selectedMembers.push({uid:uid,username:username,pfp:pfp||null});
  document.getElementById('memberSearch').value='';
  document.getElementById('memberResults').style.display='none';
  renderChips();
}

function removeMember(uid){
  selectedMembers=selectedMembers.filter(function(m){return m.uid!==uid;});
  renderChips();
}

function renderChips(){
  var wrap=document.getElementById('memberChips');
  if(!selectedMembers.length){
    wrap.innerHTML='<span style="font-size:.74rem;color:var(--muted);padding:3px 0;">No members added yet</span>';
    return;
  }
  wrap.innerHTML=selectedMembers.map(function(m){
    return'<div class="chip">'+
      '<div style="width:18px;height:18px;border-radius:50%;overflow:hidden;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:900;color:#000;">'+
        (m.pfp?'<img src="'+m.pfp+'" style="width:100%;height:100%;object-fit:cover;">':m.username[0].toUpperCase())+
      '</div>'+
      '@'+escHtml(m.username)+
      '<button onclick="removeMember(\''+m.uid+'\')">×</button>'+
    '</div>';
  }).join('');
}

// ── CREATE GROUP ──
function createGroup(){
  var name=(document.getElementById('gcNameInput').value||'').trim();
  if(!name){alert('Enter a group name!');return;}
  if(selectedMembers.length<1){alert('Add at least 1 member!');return;}

  var members=[{uid:me.uid,username:me.username,pfp:me.pfp||null}].concat(selectedMembers);
  var memberUids=members.map(function(m){return m.uid;});
  var memberNames=members.map(function(m){return m.username;});

  db.collection('chats').add({
    name:name,
    isGroup:true,
    memberUids:memberUids,
    memberNames:memberNames,
    members:members,
    createdBy:me.uid,
    createdByUsername:me.username,
    lastMsg:'',
    lastMsgTs:firebase.firestore.FieldValue.serverTimestamp(),
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(ref){
    // Notify all members
    members.forEach(function(m){
      if(m.uid!==me.uid){
        db.collection('users').doc(m.uid).collection('notifications').add({
          message:'You were added to group "'+name+'" by @'+me.username,
          type:'info',read:false,ts:firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    });
    document.getElementById('gcNameInput').value='';
    selectedMembers=[];
    renderChips();
    showNotifToast('Group "'+name+'" created!');
    openChat(ref.id);
  }).catch(function(e){alert('Error: '+e.message);});
}

// ── LISTEN CHATS ──
function listenChats(){
  if(unsubChats)unsubChats();
  unsubChats=db.collection('chats')
    .where('memberUids','array-contains',me.uid)
    .orderBy('lastMsgTs','desc')
    .onSnapshot(function(snap){
      var chats=[];
      snap.forEach(function(doc){chats.push(Object.assign({id:doc.id},doc.data()));});
      renderChatList(chats);
    });
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('tab-'+tab).classList.add('active');
  // Re-render will happen via onSnapshot which is already running
}

function renderChatList(chats){
  var list=document.getElementById('chatList');
  var filtered=chats.filter(function(c){
    if(currentTab==='groups')return c.isGroup===true;
    return !c.isGroup;
  });
  if(!filtered.length){
    list.innerHTML='<div class="no-chats">'+
      '<svg width="40" height="40" fill="var(--muted)" viewBox="0 0 24 24" style="display:block;margin:0 auto 10px;"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 11H7V9h2v2zm4 0h-2V9h2v2zm4 0h-2V9h2v2z"/></svg>'+
      (currentTab==='groups'?'No group chats yet. Create one above!':'No direct messages yet.')+
    '</div>';
    return;
  }
  list.innerHTML='';
  filtered.forEach(function(chat){list.appendChild(makeChatCard(chat));});
}

function makeChatCard(chat){
  var div=document.createElement('div');
  div.className='chat-card';
  // Icon color based on type
  var iconBg=chat.isGroup?'#e040fb':'#00d4ff';
  // Other members for DMs
  var displayName=chat.name||'Direct Chat';
  if(!chat.isGroup&&chat.members){
    var other=chat.members.find(function(m){return m.uid!==me.uid;});
    if(other)displayName='@'+other.username;
  }
  // Icon
  var iconHtml='';
  if(!chat.isGroup&&chat.members){
    var other2=chat.members.find(function(m){return m.uid!==me.uid;});
    if(other2&&other2.pfp){
      iconHtml='<img src="'+other2.pfp+'" style="width:100%;height:100%;object-fit:cover;">';
    } else {
      iconHtml='<svg width="22" height="22" fill="#000" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>';
    }
  } else {
    iconHtml='<svg width="22" height="22" fill="#fff" viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>';
  }

  var badge=chat.isGroup
    ?'<span class="group-badge">GROUP</span>'
    :'<span class="dm-badge">DM</span>';

  var memberCount=chat.isGroup?' • '+(chat.memberUids||[]).length+' members':'';

  div.innerHTML=
    '<div class="cc-top">'+
      '<div class="cc-icon" style="background:'+iconBg+';">'+iconHtml+'</div>'+
      '<div class="cc-info">'+
        '<div class="cc-name">'+escHtml(displayName)+badge+'</div>'+
        '<div class="cc-preview">'+(chat.lastMsg?escHtml(chat.lastMsg.substring(0,60)):'No messages yet')+memberCount+'</div>'+
      '</div>'+
      '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">'+
        '<div class="cc-time">'+timeAgo(chat.lastMsgTs)+'</div>'+
      '</div>'+
    '</div>';
  div.addEventListener('click',function(){openChat(chat.id);});
  return div;
}

// ── OPEN CHAT ──
function openChat(chatId){
  currentChatId=chatId;
  if(unsubMsgs)unsubMsgs();

  // Remove existing chat view
  var ex=document.getElementById('activeChatView');if(ex)ex.remove();

  db.collection('chats').doc(chatId).get().then(function(doc){
    if(!doc.exists)return;
    var chat=Object.assign({id:chatId},doc.data());
    buildChatView(chat);
  });
}

function buildChatView(chat){
  var isGroup=chat.isGroup===true;
  var displayName=chat.name||'Direct Chat';
  if(!isGroup&&chat.members){
    var other=chat.members.find(function(m){return m.uid!==me.uid;});
    if(other)displayName='@'+other.username;
  }
  var memberCount=(chat.memberUids||[]).length;

  var view=document.createElement('div');
  view.id='activeChatView';
  view.className='chat-view';
  view.style.cssText='position:fixed;inset:0;z-index:2000;background:var(--bg);display:flex;flex-direction:column;';
  view.innerHTML=
    // Topbar
    '<div class="chat-topbar">'+
      '<button onclick="closeChatView()" style="background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;flex-shrink:0;">'+
        '<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>'+
      '</button>'+
      '<div style="width:38px;height:38px;border-radius:50%;background:'+(isGroup?'#e040fb':'#00d4ff')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+
        (isGroup
          ?'<svg width="18" height="18" fill="#fff" viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>'
          :'<svg width="18" height="18" fill="#000" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>')+
      '</div>'+
      '<div class="chat-topbar-info">'+
        '<div class="chat-topbar-name">'+escHtml(displayName)+
          (isGroup?'<span class="group-badge">GROUP</span>':'<span class="dm-badge">DM</span>')+
        '</div>'+
        '<div class="chat-topbar-members">'+(isGroup?memberCount+' members':'Direct message')+'</div>'+
      '</div>'+
      // Members button (groups only)
      (isGroup?
        '<button id="toggleMembersBtn" onclick="toggleMembersPanel()" style="background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--muted);padding:6px 10px;font-size:.74rem;font-weight:900;font-family:Nunito,sans-serif;display:flex;align-items:center;gap:5px;">'+
          '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>'+
          'Members'+
        '</button>'
      :'')+
    '</div>'+

    // Messages container (relative for members panel)
    '<div style="flex:1;position:relative;overflow:hidden;display:flex;">'+
      '<div class="chat-messages" id="chatMsgsContainer"></div>'+

      // Members panel (groups only)
      (isGroup?
        '<div class="members-panel" id="membersPanel">'+
          '<div class="mp-title">'+
            '<span style="display:flex;align-items:center;gap:5px;"><svg width="14" height="14" fill="var(--accent)" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg> Members</span>'+
            '<button onclick="toggleMembersPanel()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;">×</button>'+
          '</div>'+
          '<div id="membersList"></div>'+
          (chat.createdBy===me.uid?
            '<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">'+
              '<div style="font-size:.74rem;font-weight:900;color:var(--muted);margin-bottom:7px;">Add Members</div>'+
              '<div style="position:relative;">'+
                '<input type="text" id="addMemberInput" placeholder="Search username..." oninput="searchAddMember(this.value)" style="width:100%;padding:7px 10px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:.78rem;font-family:Nunito,sans-serif;outline:none;box-sizing:border-box;">'+
                '<div id="addMemberResults" style="display:none;position:absolute;bottom:calc(100%+4px);left:0;right:0;background:#1e1e2e;border:1px solid var(--border);border-radius:9px;max-height:140px;overflow-y:auto;z-index:5;"></div>'+
              '</div>'+
            '</div>'
          :'')+
        '</div>'
      :'')+
    '</div>'+

    // Input bar
    '<div class="chat-input-bar">'+
      '<input class="chat-input" id="chatMsgInput" placeholder="Send a message..." onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendMsg();}">'+
      '<button class="send-btn" onclick="sendMsg()">'+
        '<svg width="16" height="16" fill="#000" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>'+
      '</button>'+
    '</div>';

  document.body.appendChild(view);

  // Load members list in panel
  if(isGroup&&chat.members){
    renderMembersList(chat.members,chat.createdBy,chat.id);
  }

  // Listen to messages
  listenMessages(chat.id,isGroup);
}

function closeChatView(){
  var v=document.getElementById('activeChatView');if(v)v.remove();
  if(unsubMsgs){unsubMsgs();unsubMsgs=null;}
  currentChatId=null;
  membersOpen=false;
}

function toggleMembersPanel(){
  membersOpen=!membersOpen;
  var mp=document.getElementById('membersPanel');
  if(mp)mp.classList.toggle('open',membersOpen);
  var msgs=document.getElementById('chatMsgsContainer');
  if(msgs)msgs.style.width=membersOpen?'calc(100% - 260px)':'100%';
}

// ── RENDER MEMBERS ──
function renderMembersList(members,createdBy,chatId){
  var list=document.getElementById('membersList');if(!list)return;
  list.innerHTML=members.map(function(m){
    var isOwner=m.uid===createdBy;
    var isMe=m.uid===me.uid;
    return'<div class="mp-member">'+
      '<div class="mp-av">'+
        (m.pfp?'<img src="'+m.pfp+'">':(m.username||'?')[0].toUpperCase())+
      '</div>'+
      '<div style="flex:1;min-width:0;">'+
        '<div style="font-weight:900;font-size:.82rem;">@'+escHtml(m.username||'?')+
          (isOwner?'<span style="font-size:.58rem;background:#FFD700;color:#000;padding:1px 5px;border-radius:3px;margin-left:4px;">Owner</span>':'')+
          (isMe?'<span style="font-size:.58rem;color:var(--accent);margin-left:4px;">(you)</span>':'')+
        '</div>'+
      '</div>'+
      // Owner can remove members (not themselves)
      (me.uid===createdBy&&!isMe&&!isOwner?
        '<button onclick="removeMemberFromGroup(\''+chatId+'\',\''+m.uid+'\',\''+escHtml(m.username)+'\')" style="background:none;border:none;cursor:pointer;color:#ff4757;padding:3px;">'+
          '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>'+
        '</button>'
      :'')+
    '</div>';
  }).join('');
}

function removeMemberFromGroup(chatId,uid,username){
  if(!confirm('Remove @'+username+' from group?'))return;
  db.collection('chats').doc(chatId).get().then(function(doc){
    if(!doc.exists)return;
    var chat=doc.data();
    var newMembers=(chat.members||[]).filter(function(m){return m.uid!==uid;});
    var newUids=(chat.memberUids||[]).filter(function(id){return id!==uid;});
    var newNames=(chat.memberNames||[]).filter(function(n){return n!==username;});
    db.collection('chats').doc(chatId).update({
      members:newMembers,memberUids:newUids,memberNames:newNames
    }).then(function(){
      db.collection('users').doc(uid).collection('notifications').add({
        message:'You were removed from group "'+chat.name+'".',
        type:'info',read:false,ts:firebase.firestore.FieldValue.serverTimestamp()
      });
      renderMembersList(newMembers,chat.createdBy,chatId);
    });
  });
}

// ── ADD MEMBER TO EXISTING GROUP ──
function searchAddMember(q){
  var res=document.getElementById('addMemberResults');
  q=(q||'').toLowerCase().trim();
  if(!q){res.style.display='none';return;}
  db.collection('chats').doc(currentChatId).get().then(function(doc){
    if(!doc.exists)return;
    var existingUids=doc.data().memberUids||[];
    var matches=allUsers.filter(function(u){
      return u.usernameLower.includes(q)&&!existingUids.includes(u.uid);
    }).slice(0,5);
    if(!matches.length){res.style.display='none';return;}
    res.style.display='block';
    res.innerHTML=matches.map(function(u){
      return'<div class="member-result-row" style="font-size:.8rem;" onclick="addMemberToGroup(\''+u.uid+'\',\''+escHtml(u.username)+'\',\''+escHtml(u.pfp||'')+'\')">'+
        '<div style="width:24px;height:24px;border-radius:50%;background:var(--accent);color:#000;font-weight:900;font-size:.68rem;display:flex;align-items:center;justify-content:center;overflow:hidden;">'+
          (u.pfp?'<img src="'+u.pfp+'" style="width:100%;height:100%;object-fit:cover;">':u.username[0].toUpperCase())+
        '</div>'+
        '@'+escHtml(u.username)+
      '</div>';
    }).join('');
  });
}

function addMemberToGroup(uid,username,pfp){
  db.collection('chats').doc(currentChatId).get().then(function(doc){
    if(!doc.exists)return;
    var chat=doc.data();
    var newMember={uid:uid,username:username,pfp:pfp||null};
    db.collection('chats').doc(currentChatId).update({
      members:firebase.firestore.FieldValue.arrayUnion(newMember),
      memberUids:firebase.firestore.FieldValue.arrayUnion(uid),
      memberNames:firebase.firestore.FieldValue.arrayUnion(username)
    }).then(function(){
      db.collection('users').doc(uid).collection('notifications').add({
        message:'@'+me.username+' added you to group "'+chat.name+'".',
        type:'info',read:false,ts:firebase.firestore.FieldValue.serverTimestamp()
      });
      var inp=document.getElementById('addMemberInput');if(inp)inp.value='';
      var res=document.getElementById('addMemberResults');if(res)res.style.display='none';
      // Refresh members list
      db.collection('chats').doc(currentChatId).get().then(function(d){
        if(d.exists)renderMembersList(d.data().members||[],d.data().createdBy,currentChatId);
      });
    });
  });
}

// ── MESSAGES ──
function listenMessages(chatId,isGroup){
  if(unsubMsgs)unsubMsgs();
  unsubMsgs=db.collection('chats').doc(chatId).collection('messages')
    .orderBy('ts','asc').limit(200)
    .onSnapshot(function(snap){
      var container=document.getElementById('chatMsgsContainer');
      if(!container)return;
      container.innerHTML='';
      snap.forEach(function(doc){
        var m=Object.assign({id:doc.id},doc.data());
        container.appendChild(makeMsgBubble(m,isGroup));
      });
      container.scrollTop=container.scrollHeight;
    });
}

function makeMsgBubble(m,isGroup){
  var isMine=m.senderUid===me.uid;
  var row=document.createElement('div');
  row.className='msg-row'+(isMine?' mine':'');

  if(m.deleted){
    row.innerHTML='<div style="color:var(--muted);font-style:italic;font-size:.76rem;text-align:'+(isMine?'right':'left')+';width:100%;">Message deleted</div>';
    return row;
  }

  var av='<div class="msg-av">'+
    (m.senderPfp?'<img src="'+m.senderPfp+'">':((m.senderUsername||'?')[0].toUpperCase()))+
  '</div>';

  var bubble='<div class="msg-bubble '+(isMine?'mine-b':'theirs')+'">'+
    (isGroup&&!isMine?'<div class="msg-sender">@'+escHtml(m.senderUsername||'?')+'</div>':'')+
    '<div>'+escHtml(m.text||'')+'</div>'+
    '<div class="msg-time">'+timeAgo(m.ts)+
      (isMine?
        ' <button onclick="deleteMyMsg(\''+currentChatId+'\',\''+m.id+'\')" style="background:none;border:none;color:rgba(0,0,0,.35);cursor:pointer;padding:0;margin-left:4px;vertical-align:middle;">'+
          '<svg width="11" height="11" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>'+
        '</button>'
      :'')+
    '</div>'+
  '</div>';

  row.innerHTML=isMine?(bubble+av):(av+bubble);
  return row;
}

function sendMsg(){
  var inp=document.getElementById('chatMsgInput');
  var text=(inp.value||'').trim();
  if(!text||!currentChatId)return;
  inp.value='';
  var msg={
    senderUid:me.uid,
    senderUsername:me.username,
    senderPfp:me.pfp||null,
    text:text,
    deleted:false,
    ts:firebase.firestore.FieldValue.serverTimestamp()
  };
  db.collection('chats').doc(currentChatId).collection('messages').add(msg);
  db.collection('chats').doc(currentChatId).update({
    lastMsg:text.substring(0,80),
    lastMsgTs:firebase.firestore.FieldValue.serverTimestamp()
  });
}

function deleteMyMsg(chatId,msgId){
  db.collection('chats').doc(chatId).collection('messages').doc(msgId).update({
    deleted:true,text:''
  });
}

// ── UTILS ──
function showNotifToast(msg){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a24;border:2px solid var(--accent);color:var(--text);padding:11px 20px;border-radius:12px;font-family:Nunito,sans-serif;font-weight:700;font-size:.86rem;z-index:9999;max-width:300px;width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity .5s;';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},500);},3000);
}
function timeAgo(ts){
  if(!ts)return'';
  var d=(Date.now()-(ts.toMillis?ts.toMillis():ts))/1000;
  if(d<60)return'now';if(d<3600)return Math.floor(d/60)+'m';
  if(d<86400)return Math.floor(d/3600)+'h';return Math.floor(d/86400)+'d';
}
function escHtml(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close member search dropdown on outside click
document.addEventListener('click',function(e){
  var res=document.getElementById('memberResults');
  if(res&&!res.contains(e.target)&&e.target.id!=='memberSearch'){res.style.display='none';}
  var ar=document.getElementById('addMemberResults');
  if(ar&&!ar.contains(e.target)&&e.target.id!=='addMemberInput'){ar.style.display='none';}
});
</script>
