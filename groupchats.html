<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Chats — Dv's Unblocked Games</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root{--bg:#0f0f13;--surface:#1a1a24;--surface2:#13131c;--border:#2e2e3e;--accent:#00d4ff;--text:#e8e8f0;--muted:#7878a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;padding-top:56px;padding-bottom:0;overflow:hidden;height:100vh;}
#bgWrap{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 2s;}
#bgWrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;transform:scale(1.2);}

/* ── LAYOUT ── */
.gc-layout{position:fixed;top:52px;bottom:58px;left:0;right:0;z-index:1;display:flex;flex-direction:column;overflow:hidden;}
.gc-hero{background:linear-gradient(135deg,#13132a,#1a1a2e);border-bottom:1px solid var(--border);padding:11px 16px;text-align:center;flex-shrink:0;}
.gc-hero h1{font-size:1.1rem;font-weight:900;display:flex;align-items:center;justify-content:center;gap:7px;}
.gc-hero p{color:var(--muted);font-size:.74rem;margin-top:2px;}
.gc-body{flex:1;overflow-y:auto;padding:12px;}

/* ── CREATE GROUP ── */
.create-card{background:var(--surface);border:1.5px solid var(--border);border-radius:13px;padding:13px;margin-bottom:12px;}
.create-title{font-weight:900;font-size:.86rem;margin-bottom:10px;display:flex;align-items:center;gap:6px;color:var(--accent);}
.gc-input{width:100%;padding:9px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:.86rem;font-family:'Nunito',sans-serif;outline:none;margin-bottom:8px;}
.gc-input:focus{border-color:var(--accent);}
.member-search-wrap{position:relative;margin-bottom:8px;}
.member-results{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1.5px solid var(--accent);border-radius:0 0 9px 9px;z-index:50;display:none;max-height:180px;overflow-y:auto;}
.member-result-row{display:flex;align-items:center;gap:8px;padding:8px 11px;cursor:pointer;font-size:.84rem;font-weight:700;}
.member-result-row:hover{background:rgba(0,212,255,.1);}
.chips-wrap{display:flex;flex-wrap:wrap;gap:5px;min-height:22px;margin-bottom:8px;}
.chip{display:inline-flex;align-items:center;gap:5px;background:rgba(0,212,255,.12);border:1px solid var(--accent);border-radius:999px;padding:3px 10px;font-size:.74rem;font-weight:900;}
.chip button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.9rem;line-height:1;padding:0 0 0 2px;}
.create-btn{width:100%;padding:10px;background:var(--accent);color:#000;border:none;border-radius:9px;font-weight:900;font-size:.86rem;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
.create-btn:hover{opacity:.9;}

/* ── TABS ── */
.gc-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:12px;}
.gc-tab{flex:1;padding:9px;background:none;border:none;color:var(--muted);font-weight:900;font-size:.78rem;cursor:pointer;font-family:'Nunito',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;align-items:center;justify-content:center;gap:5px;}
.gc-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── CHAT LIST ── */
.chat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 13px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.chat-card:hover{border-color:rgba(0,212,255,.4);}
.cc-top{display:flex;align-items:center;gap:10px;}
.cc-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cc-info{flex:1;min-width:0;}
.cc-name{font-weight:900;font-size:.88rem;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.cc-preview{font-size:.72rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-time{font-size:.64rem;color:var(--muted);flex-shrink:0;}
.group-badge{font-size:.55rem;background:#e040fb;color:#fff;padding:1px 6px;border-radius:4px;font-weight:900;}
.dm-badge{font-size:.55rem;background:#00d4ff;color:#000;padding:1px 6px;border-radius:4px;font-weight:900;}
.staff-badge{font-size:.55rem;background:#ff6b35;color:#fff;padding:1px 6px;border-radius:4px;font-weight:900;}
.no-chats{text-align:center;color:var(--muted);padding:30px 16px;font-size:.86rem;}

/* ── CHAT VIEW (fullscreen) ── */
.chat-view{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;font-family:'Nunito',sans-serif;}
.chat-topbar{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;min-height:54px;}
.chat-topbar-info{flex:1;min-width:0;}
.chat-topbar-name{font-weight:900;font-size:.9rem;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.chat-topbar-sub{font-size:.68rem;color:var(--muted);}
.chat-body{flex:1;display:flex;overflow:hidden;position:relative;}
.chat-messages{flex:1;overflow-y:auto;padding:12px 13px;display:flex;flex-direction:column;gap:7px;transition:width .2s;}
.msg-row{display:flex;gap:7px;align-items:flex-end;}
.msg-row.mine{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.7rem;color:#000;}
.msg-av img{width:100%;height:100%;object-fit:cover;}
.msg-bubble{max-width:72%;padding:8px 12px;border-radius:13px;font-size:.84rem;line-height:1.45;word-break:break-word;}
.msg-bubble.theirs{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:3px;}
.msg-bubble.mine-b{background:var(--accent);color:#000;border-bottom-right-radius:3px;}
.msg-sender{font-size:.66rem;font-weight:900;opacity:.7;margin-bottom:2px;}
.msg-time{font-size:.6rem;opacity:.5;margin-top:3px;display:flex;align-items:center;gap:3px;}
.chat-input-bar{padding:9px 11px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:7px;align-items:center;flex-shrink:0;}
.chat-input{flex:1;padding:9px 13px;background:var(--bg);border:1.5px solid var(--border);border-radius:999px;color:var(--text);font-size:.84rem;font-family:'Nunito',sans-serif;outline:none;}
.chat-input:focus{border-color:var(--accent);}
.send-btn{width:36px;height:36px;background:var(--accent);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.disabled-input{opacity:.5;cursor:not-allowed;}

/* ── MEMBERS PANEL ── */
.members-panel{width:0;overflow:hidden;transition:width .2s;background:var(--surface);border-left:1px solid var(--border);flex-shrink:0;}
.members-panel.open{width:220px;overflow-y:auto;}
.mp-title{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;border-bottom:1px solid var(--border);font-weight:900;font-size:.84rem;position:sticky;top:0;background:var(--surface);z-index:5;}
.mp-member{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);}
.mp-av{width:30px;height:30px;border-radius:50%;overflow:hidden;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.72rem;color:#000;flex-shrink:0;}
.mp-av img{width:100%;height:100%;object-fit:cover;}

/* ── TOAST ── */
.gc-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:11px 20px;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.86rem;z-index:9999;max-width:300px;width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;transition:opacity .4s;background:#1a1a24;border:2px solid #00d4ff;color:#e8e8f0;}
</style>
</head>

<!-- MAIN LAYOUT -->
<div class="gc-layout">
  <div class="gc-hero">
    <h1>
      <svg width="20" height="20" fill="var(--accent)" viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
      Group Chats
    </h1>
    <p>Create group chats and message everyone at once in real time.</p>
  </div>

  <div class="gc-body">
    <!-- Create group -->
    <div class="create-card">
      <div class="create-title">
        <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Create New Group
      </div>
      <input class="gc-input" id="gcNameInput" placeholder="Group name (e.g. Gaming Squad)...">
      <div class="member-search-wrap">
        <input class="gc-input" id="memberSearch" placeholder="Search users to add..." oninput="searchMembers(this.value)" style="margin-bottom:0;" autocomplete="off">
        <div class="member-results" id="memberResults"></div>
      </div>
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:6px;">Members to add:</div>
      <div class="chips-wrap" id="memberChips">
        <span style="font-size:.74rem;color:var(--muted);">No members added yet</span>
      </div>
      <button class="create-btn" onclick="createGroup()">
        <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Create Group
      </button>
    </div>

    <!-- Tabs -->
    <div class="gc-tabs">
      <button class="gc-tab active" id="tab-groups" onclick="switchTab('groups')">
        <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
        Groups
      </button>
      <button class="gc-tab" id="tab-dms" onclick="switchTab('dms')">
        <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 11H7V9h2v2zm4 0h-2V9h2v2zm4 0h-2V9h2v2z"/></svg>
        Direct Messages
      </button>
    </div>

    <div id="chatList">
      <div style="text-align:center;color:var(--muted);padding:20px;font-size:.86rem;">Loading chats...</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
var me = null;
var currentTab = 'groups';
var selectedMembers = [];
var allUsers = [];
var allGroupChats = [];
var allDMs = [];
var unsubGroups = null;
var unsubDMs = null;
var unsubMsgs = null;
var currentChatId = null;
var membersOpen = false;
var ROLE_RANK = {owner:5,developer:4,admin:3,mod:2,helper:1,user:0};

function doLogout(){
  try{localStorage.removeItem('dvs_uid');localStorage.removeItem('dvs_ts');}catch(e){}
  auth.signOut().then(function(){location.href='index.html';});
}

function getUserRole(u){
  if(!u)return'user';
  if(u.role==='owner'||u.isOwner)return'owner';
  if(u.role==='developer'||u.isDeveloper)return'developer';
  if(u.role==='admin'||u.isAdmin)return'admin';
  if(u.role==='mod'||u.isMod)return'mod';
  if(u.role==='helper'||u.isHelper)return'helper';
  return'user';
}

// ── AUTH ──
auth.onAuthStateChanged(function(firebaseUser){
  if(!firebaseUser){
    var saved=null;
    try{
      var uid=localStorage.getItem('dvs_uid');
      var ts=parseInt(localStorage.getItem('dvs_ts')||'0');
      if(uid&&Date.now()-ts<48*3600*1000)saved=uid;
    }catch(e){}
    if(saved){
      db.collection('users').doc(saved).get().then(function(doc){
        if(doc.exists){init(Object.assign({uid:saved},doc.data()));}
        else{location.href='index.html';}
      }).catch(function(){location.href='index.html';});
    } else {location.href='index.html';}
    return;
  }
  db.collection('users').doc(firebaseUser.uid).get().then(function(doc){
    if(!doc.exists){location.href='index.html';return;}
    init(Object.assign({uid:firebaseUser.uid},doc.data()));
  });
});

function init(user){
  me=user;
  var av=document.getElementById('navAvatar');
  av.innerHTML=me.pfp?'<img src="'+me.pfp+'" style="width:100%;height:100%;object-fit:cover;">':me.username[0].toUpperCase();
  document.getElementById('navUsername').textContent=me.username;
  var bg=document.getElementById('bgWrap');if(bg)bg.style.opacity='0.18';
  loadAllUsers();
  startListeners();
}

function loadAllUsers(){
  db.collection('users').get().then(function(snap){
    allUsers=[];
    snap.forEach(function(doc){
      if(doc.id===me.uid)return;
      var d=doc.data();
      allUsers.push({uid:doc.id,username:d.username||'?',usernameLower:(d.usernameLower||''),pfp:d.pfp||null});
    });
  });
}

// ── LISTENERS ──
function startListeners(){
  var myRank=ROLE_RANK[getUserRole(me)]||0;

  // Groups listener
  if(unsubGroups)unsubGroups();
  if(myRank>=2){
    // Staff: see ALL groups
    unsubGroups=db.collection('chats').where('isGroup','==',true)
      .limit(100).onSnapshot(function(snap){
        allGroupChats=[];
        snap.forEach(function(doc){allGroupChats.push(Object.assign({id:doc.id},doc.data()));});
        sortByTime(allGroupChats);
        if(currentTab==='groups')renderChatList(allGroupChats);
      },function(e){console.warn('groups snap error',e);});
  } else {
    unsubGroups=db.collection('chats')
      .where('memberUids','array-contains',me.uid)
      .where('isGroup','==',true)
      .limit(100).onSnapshot(function(snap){
        allGroupChats=[];
        snap.forEach(function(doc){allGroupChats.push(Object.assign({id:doc.id},doc.data()));});
        sortByTime(allGroupChats);
        if(currentTab==='groups')renderChatList(allGroupChats);
      },function(e){console.warn('groups snap error',e);});
  }

  // DMs listener
  if(unsubDMs)unsubDMs();
  unsubDMs=db.collection('chats')
    .where('memberUids','array-contains',me.uid)
    .where('isGroup','==',false)
    .limit(100).onSnapshot(function(snap){
      allDMs=[];
      snap.forEach(function(doc){allDMs.push(Object.assign({id:doc.id},doc.data()));});
      sortByTime(allDMs);
      if(currentTab==='dms')renderChatList(allDMs);
    },function(e){console.warn('dms snap error',e);});
}

function sortByTime(arr){
  arr.sort(function(a,b){
    var at=a.lastMsgTs?a.lastMsgTs.toMillis?a.lastMsgTs.toMillis():a.lastMsgTs:0;
    var bt=b.lastMsgTs?b.lastMsgTs.toMillis?b.lastMsgTs.toMillis():b.lastMsgTs:0;
    return bt-at;
  });
}

// ── TABS ──
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.gc-tab').forEach(function(b){b.classList.remove('active');});
  var tb=document.getElementById('tab-'+tab);if(tb)tb.classList.add('active');
  renderChatList(tab==='groups'?allGroupChats:allDMs);
}

// ── RENDER CHAT LIST ──
function renderChatList(chats){
  var list=document.getElementById('chatList');if(!list)return;
  if(!chats||!chats.length){
    list.innerHTML='<div class="no-chats">'+
      '<svg width="38" height="38" fill="var(--muted)" viewBox="0 0 24 24" style="display:block;margin:0 auto 10px;"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 11H7V9h2v2zm4 0h-2V9h2v2zm4 0h-2V9h2v2z"/></svg>'+
      (currentTab==='groups'?'No group chats yet. Create one above!':'No direct messages yet. Go to Friends to start a DM.')+
    '</div>';
    return;
  }
  list.innerHTML='';
  chats.forEach(function(chat){list.appendChild(makeChatCard(chat));});
}

function makeChatCard(chat){
  var div=document.createElement('div');
  div.className='chat-card';
  var isGroup=chat.isGroup===true;
  var isMember=(chat.memberUids||[]).includes(me.uid);
  var myRank=ROLE_RANK[getUserRole(me)]||0;
  var isStaffView=myRank>=2&&!isMember&&isGroup;
  var displayName=chat.name||'Direct Chat';
  if(!isGroup&&chat.members){
    var other=chat.members.find(function(m){return m.uid!==me.uid;});
    if(other)displayName='@'+other.username;
  }
  div.innerHTML=
    '<div class="cc-top">'+
      '<div class="cc-icon" style="background:'+(isGroup?'#e040fb':'#00d4ff')+';">'+
        (isGroup
          ?'<svg width="20" height="20" fill="#fff" viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>'
          :'<svg width="20" height="20" fill="#000" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>')+
      '</div>'+
      '<div class="cc-info">'+
        '<div class="cc-name">'+escHtml(displayName)+
          (isGroup?'<span class="group-badge">GROUP</span>':'<span class="dm-badge">DM</span>')+
          (isStaffView?'<span class="staff-badge">STAFF VIEW</span>':'')+
        '</div>'+
        '<div class="cc-preview">'+(chat.lastMsg?escHtml(chat.lastMsg.substring(0,55)):'No messages yet')+
          (isGroup?' · '+(chat.memberUids||[]).length+' members':'')+
        '</div>'+
      '</div>'+
      '<div class="cc-time">'+timeAgo(chat.lastMsgTs)+'</div>'+
    '</div>';
  div.addEventListener('click',function(){openChat(chat.id);});
  return div;
}

// ── OPEN CHAT ──
function openChat(chatId){
  currentChatId=chatId;
  db.collection('chats').doc(chatId).get().then(function(doc){
    if(!doc.exists){showToast('Chat not found!','#ff4757');return;}
    buildChatView(Object.assign({id:chatId},doc.data()));
  }).catch(function(e){showToast('Error: '+e.message,'#ff4757');});
}

function buildChatView(chat){
  var ex=document.getElementById('activeChatView');if(ex)ex.remove();
  if(unsubMsgs){unsubMsgs();unsubMsgs=null;}
  membersOpen=false;

  var isGroup=chat.isGroup===true;
  var isMember=(chat.memberUids||[]).includes(me.uid);
  var myRank=ROLE_RANK[getUserRole(me)]||0;
  var isStaffView=myRank>=2&&!isMember&&isGroup;
  var canSend=isMember;

  var displayName=chat.name||'Direct Chat';
  if(!isGroup&&chat.members){
    var other=chat.members.find(function(m){return m.uid!==me.uid;});
    if(other)displayName='@'+other.username;
  }

  var view=document.createElement('div');
  view.id='activeChatView';
  view.className='chat-view';

  view.innerHTML=
    // TOPBAR
    '<div class="chat-topbar">'+
      '<button onclick="closeChatView()" style="background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;flex-shrink:0;">'+
        '<svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>'+
      '</button>'+
      '<div style="width:38px;height:38px;border-radius:50%;background:'+(isGroup?'#e040fb':'#00d4ff')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+
        (isGroup
          ?'<svg width="19" height="19" fill="#fff" viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>'
          :'<svg width="19" height="19" fill="#000" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>')+
      '</div>'+
      '<div class="chat-topbar-info">'+
        '<div class="chat-topbar-name">'+escHtml(displayName)+
          (isGroup?'<span class="group-badge">GROUP</span>':'<span class="dm-badge">DM</span>')+
          (isStaffView?'<span class="staff-badge">STAFF VIEW</span>':'')+
        '</div>'+
        '<div class="chat-topbar-sub">'+(isGroup?(chat.memberUids||[]).length+' members':'Direct message')+'</div>'+
      '</div>'+
      (isStaffView?'<button onclick="staffJoinGroup(\''+chat.id+'\')" style="background:#2ed573;color:#000;border:none;padding:7px 13px;border-radius:9px;font-weight:900;font-size:.76rem;cursor:pointer;font-family:Nunito,sans-serif;flex-shrink:0;">+ Join</button>':'')+
      (isGroup?'<button onclick="toggleMembersPanel()" style="background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--muted);padding:6px 10px;font-size:.72rem;font-weight:900;font-family:Nunito,sans-serif;display:flex;align-items:center;gap:4px;flex-shrink:0;">'+
        '<svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>Members</button>':'')+
    '</div>'+
    // BODY
    '<div class="chat-body">'+
      '<div class="chat-messages" id="chatMsgsContainer"></div>'+
      (isGroup?'<div class="members-panel" id="membersPanel"><div class="mp-title"><span>Members</span><button onclick="toggleMembersPanel()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;line-height:1;">×</button></div><div id="membersList"></div></div>':'')+
    '</div>'+
    // INPUT
    '<div class="chat-input-bar">'+
      (isStaffView?'<div style="font-size:.72rem;color:#ff6b35;font-weight:900;white-space:nowrap;">👁 Join to chat</div>':'')+
      '<input class="chat-input'+(isStaffView?' disabled-input':'')+'" id="chatMsgInput" placeholder="'+(isStaffView?'Join the group to send messages...':'Type a message...')+'" '+(isStaffView?'disabled':'')+' onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendMsg();}">'+
      (!isStaffView?'<button class="send-btn" onclick="sendMsg()"><svg width="16" height="16" fill="#000" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>':'')+
    '</div>';

  document.body.appendChild(view);

  if(isGroup&&chat.members){
    renderMembersList(chat.members,chat.createdBy,chat.id);
  }

  listenMessages(chat.id,isGroup,myRank);
}

function closeChatView(){
  var v=document.getElementById('activeChatView');if(v)v.remove();
  if(unsubMsgs){unsubMsgs();unsubMsgs=null;}
  currentChatId=null;membersOpen=false;
}

function toggleMembersPanel(){
  membersOpen=!membersOpen;
  var mp=document.getElementById('membersPanel');if(mp)mp.classList.toggle('open',membersOpen);
  var msgs=document.getElementById('chatMsgsContainer');
  if(msgs)msgs.style.width=membersOpen?'calc(100% - 220px)':'100%';
}

// ── MEMBERS PANEL ──
function renderMembersList(members,createdBy,chatId){
  var list=document.getElementById('membersList');if(!list)return;
  var myRank=ROLE_RANK[getUserRole(me)]||0;
  list.innerHTML='';
  members.forEach(function(m){
    var isCreator=m.uid===createdBy;
    var isMe=m.uid===me.uid;
    var canRemove=(me.uid===createdBy||myRank>=3)&&!isMe&&!isCreator;
    var row=document.createElement('div');
    row.className='mp-member';
    row.innerHTML=
      '<div class="mp-av">'+(m.pfp?'<img src="'+m.pfp+'">':m.username[0].toUpperCase())+'</div>'+
      '<div style="flex:1;min-width:0;">'+
        '<div style="font-weight:900;font-size:.8rem;">@'+escHtml(m.username||'?')+
          (isCreator?'<span style="font-size:.56rem;background:#FFD700;color:#000;padding:1px 5px;border-radius:3px;margin-left:4px;">Host</span>':'')+
          (isMe?'<span style="font-size:.56rem;color:var(--accent);margin-left:3px;">(you)</span>':'')+
        '</div>'+
      '</div>'+
      (canRemove?'<button onclick="removeMemberFromGroup(\''+chatId+'\',\''+m.uid+'\',\''+escHtml(m.username)+'\')" style="background:none;border:none;cursor:pointer;color:#ff4757;padding:3px;">'+
        '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>':'');
    list.appendChild(row);
  });
}

function removeMemberFromGroup(chatId,uid,username){
  if(!confirm('Remove @'+username+' from group?'))return;
  db.collection('chats').doc(chatId).get().then(function(doc){
    if(!doc.exists)return;
    var d=doc.data();
    var newMembers=(d.members||[]).filter(function(m){return m.uid!==uid;});
    var newUids=(d.memberUids||[]).filter(function(id){return id!==uid;});
    var newNames=(d.memberNames||[]).filter(function(n){return n!==username;});
    db.collection('chats').doc(chatId).update({members:newMembers,memberUids:newUids,memberNames:newNames})
      .then(function(){renderMembersList(newMembers,d.createdBy,chatId);showToast('@'+username+' removed.');});
  });
}

function staffJoinGroup(chatId){
  if(!confirm('Join this group as a staff member?'))return;
  db.collection('chats').doc(chatId).update({
    memberUids:firebase.firestore.FieldValue.arrayUnion(me.uid),
    memberNames:firebase.firestore.FieldValue.arrayUnion(me.username),
    members:firebase.firestore.FieldValue.arrayUnion({uid:me.uid,username:me.username,pfp:me.pfp||null})
  }).then(function(){
    showToast('Joined group!');
    closeChatView();
    setTimeout(function(){openChat(chatId);},300);
  });
}

// ── MESSAGES ──
function listenMessages(chatId,isGroup,myRank){
  if(unsubMsgs)unsubMsgs();
  unsubMsgs=db.collection('chats').doc(chatId).collection('messages')
    .orderBy('ts','asc').limit(200)
    .onSnapshot(function(snap){
      var container=document.getElementById('chatMsgsContainer');if(!container)return;
      container.innerHTML='';
      snap.forEach(function(msgDoc){
        container.appendChild(makeMsgBubble(Object.assign({id:msgDoc.id},msgDoc.data()),isGroup,myRank));
      });
      container.scrollTop=container.scrollHeight;
    },function(e){console.warn('msgs snap error',e);});
}

function makeMsgBubble(m,isGroup,myRank){
  var isMine=m.senderUid===me.uid;
  var canDel=isMine||(myRank>=2);
  var row=document.createElement('div');
  row.className='msg-row'+(isMine?' mine':'');
  if(m.deleted){
    row.innerHTML='<div style="color:var(--muted);font-style:italic;font-size:.74rem;text-align:'+(isMine?'right':'left')+';width:100%;padding:2px 36px;">Message deleted</div>';
    return row;
  }
  var av='<div class="msg-av">'+(m.senderPfp?'<img src="'+m.senderPfp+'">':((m.senderUsername||'?')[0].toUpperCase()))+'</div>';
  var delBtn=canDel?'<button onclick="deleteMsg(\''+currentChatId+'\',\''+m.id+'\')" style="background:none;border:none;color:'+(isMine?'rgba(0,0,0,.3)':'rgba(200,200,200,.35)')+';cursor:pointer;padding:0;margin-left:3px;vertical-align:middle;line-height:1;">'+
    '<svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>':'';
  var bubble=
    '<div class="msg-bubble '+(isMine?'mine-b':'theirs')+'">'+
      (isGroup&&!isMine?'<div class="msg-sender">@'+escHtml(m.senderUsername||'?')+'</div>':'')+
      '<div>'+escHtml(m.text||'')+'</div>'+
      '<div class="msg-time">'+timeAgo(m.ts)+delBtn+'</div>'+
    '</div>';
  row.innerHTML=isMine?(bubble+av):(av+bubble);
  return row;
}

function sendMsg(){
  var inp=document.getElementById('chatMsgInput');
  var text=(inp.value||'').trim();
  if(!text||!currentChatId)return;
  inp.value='';
  db.collection('chats').doc(currentChatId).collection('messages').add({
    senderUid:me.uid,senderUsername:me.username,senderPfp:me.pfp||null,
    text:text,deleted:false,ts:firebase.firestore.FieldValue.serverTimestamp()
  });
  db.collection('chats').doc(currentChatId).update({
    lastMsg:text.substring(0,80),lastMsgTs:firebase.firestore.FieldValue.serverTimestamp()
  });
}

function deleteMsg(chatId,msgId){
  db.collection('chats').doc(chatId).collection('messages').doc(msgId).update({deleted:true,text:''});
}

// ── CREATE GROUP ──
function searchMembers(q){
  var res=document.getElementById('memberResults');
  q=(q||'').toLowerCase().trim();
  if(q.length<1){res.style.display='none';return;}
  var matches=allUsers.filter(function(u){
    return u.usernameLower.includes(q)&&!selectedMembers.find(function(m){return m.uid===u.uid;});
  }).slice(0,7);
  if(!matches.length){res.style.display='none';return;}
  res.style.display='block';
  res.innerHTML=matches.map(function(u){
    return'<div class="member-result-row" onclick="addMember(\''+u.uid+'\',\''+escHtml(u.username)+'\',\''+escHtml(u.pfp||'')+'\')">'+
      '<div style="width:26px;height:26px;border-radius:50%;background:var(--accent);color:#000;font-weight:900;font-size:.68rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;">'+
        (u.pfp?'<img src="'+u.pfp+'" style="width:100%;height:100%;object-fit:cover;">':u.username[0].toUpperCase())+
      '</div>@'+escHtml(u.username)+'</div>';
  }).join('');
}

function addMember(uid,username,pfp){
  if(selectedMembers.find(function(m){return m.uid===uid;}))return;
  selectedMembers.push({uid:uid,username:username,pfp:pfp||null});
  document.getElementById('memberSearch').value='';
  document.getElementById('memberResults').style.display='none';
  renderChips();
}
function removeMember(uid){
  selectedMembers=selectedMembers.filter(function(m){return m.uid!==uid;});
  renderChips();
}
function renderChips(){
  var wrap=document.getElementById('memberChips');
  if(!selectedMembers.length){
    wrap.innerHTML='<span style="font-size:.74rem;color:var(--muted);">No members added yet</span>';
    return;
  }
  wrap.innerHTML=selectedMembers.map(function(m){
    return'<div class="chip">'+
      '<div style="width:17px;height:17px;border-radius:50%;overflow:hidden;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:900;color:#000;">'+
        (m.pfp?'<img src="'+m.pfp+'" style="width:100%;height:100%;object-fit:cover;">':m.username[0].toUpperCase())+
      '</div>@'+escHtml(m.username)+'<button onclick="removeMember(\''+m.uid+'\')">×</button></div>';
  }).join('');
}

function createGroup(){
  var name=(document.getElementById('gcNameInput').value||'').trim();
  if(!name){showToast('Enter a group name!','#ff4757');return;}
  if(!selectedMembers.length){showToast('Add at least 1 member!','#ff4757');return;}
  var members=[{uid:me.uid,username:me.username,pfp:me.pfp||null}].concat(selectedMembers);
  var memberUids=members.map(function(m){return m.uid;});
  var memberNames=members.map(function(m){return m.username;});
  db.collection('chats').add({
    name:name,isGroup:true,
    members:members,memberUids:memberUids,memberNames:memberNames,
    createdBy:me.uid,createdByUsername:me.username,
    lastMsg:'',lastMsgTs:firebase.firestore.FieldValue.serverTimestamp(),
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(ref){
    members.forEach(function(m){
      if(m.uid!==me.uid){
        db.collection('users').doc(m.uid).collection('notifications').add({
          message:'📢 @'+me.username+' added you to group "'+name+'"!',
          type:'info',read:false,ts:firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    });
    document.getElementById('gcNameInput').value='';
    selectedMembers=[];renderChips();
    showToast('"'+name+'" created!');
    openChat(ref.id);
  }).catch(function(e){showToast('Error: '+e.message,'#ff4757');});
}

// ── UTILS ──
function showToast(msg,color){
  color=color||'#00d4ff';
  var t=document.createElement('div');
  t.className='gc-toast';
  t.style.borderColor=color;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){if(t.parentNode)t.remove();},400);},3000);
}
function timeAgo(ts){
  if(!ts)return'';
  var d=(Date.now()-(ts.toMillis?ts.toMillis():ts))/1000;
  if(d<60)return'now';
  if(d<3600)return Math.floor(d/60)+'m';
  if(d<86400)return Math.floor(d/3600)+'h';
  return Math.floor(d/86400)+'d';
}
function escHtml(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
document.addEventListener('click',function(e){
  var res=document.getElementById('memberResults');
  if(res&&!res.contains(e.target)&&e.target.id!=='memberSearch')res.style.display='none';
});
</script>
</body>
