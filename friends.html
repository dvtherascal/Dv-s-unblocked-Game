<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends — Dv's Unblocked Games</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root{--bg:#0f0f13;--surface:#1a1a24;--surface2:#13131c;--border:#2e2e3e;--accent:#00d4ff;--text:#e8e8f0;--muted:#7878a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;padding-top:56px;padding-bottom:70px;}
#bgWrap{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 2s;}
#bgWrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;transform:scale(1.2);}
.fr-wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:14px 12px 80px;}
.fr-hero{background:linear-gradient(135deg,#13132a,#1a1a2e);border-bottom:1px solid var(--border);padding:14px 16px;text-align:center;position:relative;z-index:1;}
.fr-hero h1{font-size:1.25rem;font-weight:900;display:flex;align-items:center;justify-content:center;gap:8px;}
.fr-hero p{color:var(--muted);font-size:.8rem;margin-top:3px;}
.tab-bar{display:flex;border-bottom:2px solid var(--border);margin-bottom:14px;}
.tab-btn{flex:1;padding:9px;background:none;border:none;color:var(--muted);font-weight:900;font-size:.8rem;cursor:pointer;font-family:'Nunito',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;align-items:center;justify-content:center;gap:5px;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.search-box{width:100%;padding:10px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:.88rem;font-family:'Nunito',sans-serif;outline:none;margin-bottom:12px;}
.search-box:focus{border-color:var(--accent);}
.user-card{background:var(--surface);border:1.5px solid var(--border);border-radius:13px;padding:12px 14px;margin-bottom:9px;display:flex;align-items:center;gap:11px;transition:border-color .15s;}
.user-card:hover{border-color:rgba(0,212,255,.35);}
.uc-av{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.9rem;}
.uc-av img{width:100%;height:100%;object-fit:cover;}
.uc-info{flex:1;min-width:0;}
.uc-name{font-weight:900;font-size:.9rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.uc-sub{font-size:.72rem;color:var(--muted);margin-top:2px;}
.uc-game{font-size:.69rem;color:#2ed573;margin-top:2px;display:flex;align-items:center;gap:3px;}
.uc-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.ub{padding:6px 11px;border:none;border-radius:8px;font-weight:900;font-size:.76rem;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;gap:4px;}
.ub-cyan{background:#00d4ff;color:#000;}
.ub-green{background:#2ed573;color:#000;}
.ub-red{background:#ff4757;color:#fff;}
.ub-ghost{background:var(--bg);border:1.5px solid var(--border);color:var(--muted);}
.ub-purple{background:#e040fb;color:#fff;}
.no-content{text-align:center;color:var(--muted);padding:30px 16px;font-size:.88rem;}
.req-badge{background:#ff4757;color:#fff;font-size:.6rem;padding:1px 6px;border-radius:999px;font-weight:900;margin-left:4px;}

/* CHAT VIEW */
.chat-view{position:fixed;inset:0;z-index:3000;background:var(--bg);display:flex;flex-direction:column;font-family:'Nunito',sans-serif;}
.chat-topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.chat-messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.msg-row{display:flex;gap:8px;align-items:flex-end;}
.msg-row.mine{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.72rem;color:#000;}
.msg-av img{width:100%;height:100%;object-fit:cover;}
.msg-bubble{max-width:72%;padding:9px 13px;border-radius:14px;font-size:.86rem;line-height:1.45;word-break:break-word;}
.msg-bubble.theirs{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg-bubble.mine-b{background:var(--accent);color:#000;border-bottom-right-radius:4px;}
.msg-time{font-size:.62rem;opacity:.5;margin-top:3px;}
.chat-input-bar{padding:10px 12px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0;}
.chat-input{flex:1;padding:10px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:999px;color:var(--text);font-size:.86rem;font-family:'Nunito',sans-serif;outline:none;}
.chat-input:focus{border-color:var(--accent);}
.send-btn{width:38px;height:38px;background:var(--accent);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
</style>
</head>
<body>

  <iframe src="https://www.youtube.com/embed/Bj3qepNUFyE?autoplay=1&mute=1&loop=1&playlist=Bj3qepNUFyE&controls=0&showinfo=0&rel=0&modestbranding=1"
    allow="autoplay; fullscreen" allowfullscreen></iframe>

  <div class="nav-left">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="#FFD700">
      <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>

  </a>

<!-- HERO -->
<div class="fr-hero">
  <h1>
    <svg width="22" height="22" fill="var(--accent)" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    Friends
  </h1>
  <p>Add friends, see what they're playing, chat in real time.</p>
</div>

<div class="fr-wrap">

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" id="ftab-friends" onclick="switchTab('friends')">
      <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      My Friends
    </button>
    <button class="tab-btn" id="ftab-requests" onclick="switchTab('requests')">
      <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Requests <span class="req-badge" id="reqBadge" style="display:none;">0</span>
    </button>
    <button class="tab-btn" id="ftab-search" onclick="switchTab('search')">
      <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      Find People
    </button>
  </div>

  <div id="tabContent"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
var me = null;
var currentTab = 'friends';
var unsubChat = null;
var activeChatUid = null;

function doLogout(){auth.signOut().then(function(){location.href='index.html';});}

auth.onAuthStateChanged(function(firebaseUser){
  if(!firebaseUser){location.href='index.html';return;}
  db.collection('users').doc(firebaseUser.uid).get().then(function(doc){
    if(!doc.exists){location.href='index.html';return;}
    me=Object.assign({uid:firebaseUser.uid},doc.data());
    var av=document.getElementById('navAvatar');
    av.innerHTML=me.pfp?'<img src="'+me.pfp+'" style="width:100%;height:100%;object-fit:cover;">':me.username[0].toUpperCase();
    document.getElementById('navUsername').textContent=me.username;
    var bg=document.getElementById('bgWrap');if(bg)bg.style.opacity='0.18';
    listenRequests();
    switchTab('friends');
  });
});

// ── TABS ──
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  var tb=document.getElementById('ftab-'+tab);if(tb)tb.classList.add('active');
  var c=document.getElementById('tabContent');
  if(tab==='friends')renderFriends();
  else if(tab==='requests')renderRequests();
  else if(tab==='search')renderSearch();
}

// ── LISTEN REQUESTS (badge) ──
function listenRequests(){
  db.collection('users').doc(me.uid).onSnapshot(function(doc){
    if(!doc.exists)return;
    var d=doc.data();
    me=Object.assign(me,d);
    var reqs=(d.friendRequests||[]);
    var badge=document.getElementById('reqBadge');
    if(badge){badge.textContent=reqs.length;badge.style.display=reqs.length?'inline':'none';}
    if(currentTab==='friends')renderFriends();
    if(currentTab==='requests')renderRequests();
  });
}

// ── FRIENDS TAB ──
function renderFriends(){
  var c=document.getElementById('tabContent');
  var friends=me.friends||[];
  if(!friends.length){
    c.innerHTML='<div class="no-content">'+
      '<svg width="40" height="40" fill="var(--muted)" viewBox="0 0 24 24" style="display:block;margin:0 auto 10px;"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>'+
      'No friends yet — find people in the search tab!'+
    '</div>';
    return;
  }
  c.innerHTML='<div id="friendsList"></div>';
  var list=document.getElementById('friendsList');
  friends.forEach(function(f){
    db.collection('users').doc(f.uid).get().then(function(doc){
      if(!doc.exists)return;
      var u=Object.assign({uid:doc.id},doc.data());
      list.appendChild(makeFriendCard(u));
    });
  });
}

function makeFriendCard(u){
  var div=document.createElement('div');
  div.className='user-card';
  var isOnline=u.lastSeen&&(Date.now()-(u.lastSeen.toMillis?u.lastSeen.toMillis():u.lastSeen))<300000;
  var gameTag=u.currentGame?'<div class="uc-game"><svg width="11" height="11" fill="currentColor" viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg> Playing: '+escHtml(u.currentGame)+'</div>':'';
  div.innerHTML=
    '<div class="uc-av" style="background:'+(u.pfp?'transparent':'#00d4ff')+';">'+
      (u.pfp?'<img src="'+u.pfp+'">':u.username[0].toUpperCase())+
    '</div>'+
    '<div class="uc-info">'+
      '<div class="uc-name">@'+escHtml(u.username||'?')+
        '<span style="width:8px;height:8px;border-radius:50%;background:'+(isOnline?'#2ed573':'#555')+';display:inline-block;flex-shrink:0;" title="'+(isOnline?'Online':'Offline')+'"></span>'+
      '</div>'+
      '<div class="uc-sub">'+(u.name||'')+' • '+( u.gamesPlayed||0)+' games played</div>'+
      gameTag+
    '</div>'+
    '<div class="uc-btns">'+
      '<button class="ub ub-cyan" onclick="openDM(\''+u.uid+'\',\''+escHtml(u.username)+'\',\''+escHtml(u.pfp||'')+'\')">'+
        '<svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 11H7V9h2v2zm4 0h-2V9h2v2zm4 0h-2V9h2v2z"/></svg>'+
        'Chat'+
      '</button>'+
      '<button class="ub ub-red" onclick="removeFriend(\''+u.uid+'\',\''+escHtml(u.username)+'\')">'+
        '<svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>'+
        'Remove'+
      '</button>'+
    '</div>';
  return div;
}

// ── REQUESTS TAB ──
function renderRequests(){
  var c=document.getElementById('tabContent');
  var reqs=me.friendRequests||[];
  if(!reqs.length){
    c.innerHTML='<div class="no-content">'+
      '<svg width="36" height="36" fill="var(--muted)" viewBox="0 0 24 24" style="display:block;margin:0 auto 10px;"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>'+
      'No pending friend requests.'+
    '</div>';
    return;
  }
  c.innerHTML='<div id="reqList"></div>';
  var list=document.getElementById('reqList');
  reqs.forEach(function(r){
    db.collection('users').doc(r.uid).get().then(function(doc){
      if(!doc.exists)return;
      var u=Object.assign({uid:doc.id},doc.data());
      var div=document.createElement('div');
      div.className='user-card';
      div.innerHTML=
        '<div class="uc-av" style="background:'+(u.pfp?'transparent':'#00d4ff')+';">'+
          (u.pfp?'<img src="'+u.pfp+'">':u.username[0].toUpperCase())+
        '</div>'+
        '<div class="uc-info">'+
          '<div class="uc-name">@'+escHtml(u.username||'?')+'</div>'+
          '<div class="uc-sub">'+(u.name||'')+'</div>'+
        '</div>'+
        '<div class="uc-btns">'+
          '<button class="ub ub-green" onclick="acceptFriend(\''+u.uid+'\',\''+escHtml(u.username)+'\',\''+escHtml(u.pfp||'')+'\')">'+
            '<svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'+
            'Accept'+
          '</button>'+
          '<button class="ub ub-red" onclick="declineFriend(\''+u.uid+'\')">'+
            '<svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>'+
            'Decline'+
          '</button>'+
        '</div>';
      list.appendChild(div);
    });
  });
}

// ── SEARCH TAB ──
function renderSearch(){
  var c=document.getElementById('tabContent');
  c.innerHTML=
    '<input class="search-box" id="userSearchInput" placeholder="Search by username..." oninput="doUserSearch(this.value)">'+
    '<div id="searchResults"></div>';
}

function doUserSearch(q){
  var res=document.getElementById('searchResults');
  q=(q||'').toLowerCase().trim();
  if(q.length<2){res.innerHTML='';return;}
  db.collection('users')
    .where('usernameLower','>=',q)
    .where('usernameLower','<=',q+'\uf8ff')
    .limit(10).get().then(function(snap){
      if(snap.empty){res.innerHTML='<div class="no-content">No users found.</div>';return;}
      res.innerHTML='';
      snap.forEach(function(doc){
        var u=Object.assign({uid:doc.id},doc.data());
        if(u.uid===me.uid)return;
        res.appendChild(makeSearchCard(u));
      });
    });
}

function makeSearchCard(u){
  var isFriend=(me.friends||[]).some(function(f){return f.uid===u.uid;});
  var sentReq=(u.friendRequests||[]).some(function(r){return r.uid===me.uid;});
  var gotReq=(me.friendRequests||[]).some(function(r){return r.uid===u.uid;});
  var div=document.createElement('div');
  div.className='user-card';
  var actionBtn='';
  if(isFriend){
    actionBtn='<button class="ub ub-ghost" disabled style="opacity:.5;cursor:default;"><svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Friends</button>';
  } else if(gotReq){
    actionBtn='<button class="ub ub-green" onclick="acceptFriend(\''+u.uid+'\',\''+escHtml(u.username)+'\',\''+escHtml(u.pfp||'')+'\')"><svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Accept</button>';
  } else if(sentReq){
    actionBtn='<button class="ub ub-ghost" disabled style="opacity:.5;cursor:default;"><svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg> Sent</button>';
  } else {
    actionBtn='<button class="ub ub-cyan" onclick="sendFriendRequest(\''+u.uid+'\',\''+escHtml(u.username)+'\')"><svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> Add</button>';
  }
  div.innerHTML=
    '<div class="uc-av" style="background:'+(u.pfp?'transparent':'#00d4ff')+';">'+
      (u.pfp?'<img src="'+u.pfp+'">':u.username[0].toUpperCase())+
    '</div>'+
    '<div class="uc-info">'+
      '<div class="uc-name">@'+escHtml(u.username||'?')+'</div>'+
      '<div class="uc-sub">'+(u.name||'')+' • '+(u.gamesPlayed||0)+' games</div>'+
    '</div>'+
    '<div class="uc-btns">'+actionBtn+'</div>';
  return div;
}

// ── FRIEND ACTIONS ──
function sendFriendRequest(toUid,toUsername){
  db.collection('users').doc(toUid).update({
    friendRequests:firebase.firestore.FieldValue.arrayUnion({uid:me.uid,username:me.username,pfp:me.pfp||null})
  }).then(function(){
    db.collection('users').doc(toUid).collection('notifications').add({
      message:'👋 @'+me.username+' sent you a friend request!',
      type:'info',read:false,ts:firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast('Friend request sent to @'+toUsername+'!');
    doUserSearch(document.getElementById('userSearchInput').value);
  });
}

function acceptFriend(uid,username,pfp){
  var batch=db.batch();
  var myRef=db.collection('users').doc(me.uid);
  var theirRef=db.collection('users').doc(uid);
  batch.update(myRef,{
    friends:firebase.firestore.FieldValue.arrayUnion({uid:uid,username:username,pfp:pfp||null}),
    friendRequests:firebase.firestore.FieldValue.arrayRemove({uid:uid,username:username,pfp:pfp||null})
  });
  batch.update(theirRef,{
    friends:firebase.firestore.FieldValue.arrayUnion({uid:me.uid,username:me.username,pfp:me.pfp||null})
  });
  batch.commit().then(function(){
    db.collection('users').doc(uid).collection('notifications').add({
      message:'🎉 @'+me.username+' accepted your friend request!',
      type:'info',read:false,ts:firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast('You and @'+username+' are now friends!');
  });
}

function declineFriend(uid){
  db.collection('users').doc(me.uid).get().then(function(doc){
    var reqs=(doc.data().friendRequests||[]);
    var toRemove=reqs.find(function(r){return r.uid===uid;});
    if(!toRemove)return;
    db.collection('users').doc(me.uid).update({
      friendRequests:firebase.firestore.FieldValue.arrayRemove(toRemove)
    });
  });
}

function removeFriend(uid,username){
  if(!confirm('Remove @'+username+' from friends?'))return;
  var myFriend=(me.friends||[]).find(function(f){return f.uid===uid;});
  var theirFriend={uid:me.uid,username:me.username,pfp:me.pfp||null};
  var batch=db.batch();
  if(myFriend)batch.update(db.collection('users').doc(me.uid),{friends:firebase.firestore.FieldValue.arrayRemove(myFriend)});
  batch.update(db.collection('users').doc(uid),{friends:firebase.firestore.FieldValue.arrayRemove(theirFriend)});
  batch.commit().then(function(){showToast('@'+username+' removed from friends.');});
}

// ── DIRECT MESSAGE ──
function openDM(uid,username,pfp){
  // Find or create a DM chat
  var members=[
    {uid:me.uid,username:me.username,pfp:me.pfp||null},
    {uid:uid,username:username,pfp:pfp||null}
  ];
  var memberUids=[me.uid,uid].sort();
  var dmId=memberUids.join('_dm_');

  db.collection('chats').doc(dmId).get().then(function(doc){
    if(!doc.exists){
      db.collection('chats').doc(dmId).set({
        name:'',isGroup:false,members:members,
        memberUids:[me.uid,uid],memberNames:[me.username,username],
        createdBy:me.uid,lastMsg:'',
        lastMsgTs:firebase.firestore.FieldValue.serverTimestamp(),
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    buildDMView(dmId,username,pfp);
  });
}

function buildDMView(chatId,username,pfp){
  var ex=document.getElementById('dmChatView');if(ex)ex.remove();
  if(unsubChat){unsubChat();unsubChat=null;}
  activeChatUid=chatId;

  var view=document.createElement('div');
  view.id='dmChatView';
  view.className='chat-view';
  view.innerHTML=
    '<div class="chat-topbar">'+
      '<button onclick="closeDM()" style="background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;">'+
        '<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>'+
      '</button>'+
      '<div style="width:36px;height:36px;border-radius:50%;overflow:hidden;background:#00d4ff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:.8rem;">'+
        (pfp?'<img src="'+pfp+'" style="width:100%;height:100%;object-fit:cover;">':username[0].toUpperCase())+
      '</div>'+
      '<div>'+
        '<div style="font-weight:900;font-size:.94rem;">@'+escHtml(username)+'</div>'+
        '<div style="font-size:.7rem;color:var(--muted);">Direct Message</div>'+
      '</div>'+
    '</div>'+
    '<div class="chat-messages" id="dmMsgs"></div>'+
    '<div class="chat-input-bar">'+
      '<input class="chat-input" id="dmInput" placeholder="Send a message..." onkeydown="if(event.key===\'Enter\')sendDM(\''+chatId+'\')">'+
      '<button class="send-btn" onclick="sendDM(\''+chatId+'\')">'+
        '<svg width="16" height="16" fill="#000" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>'+
      '</button>'+
    '</div>';
  document.body.appendChild(view);

  unsubChat=db.collection('chats').doc(chatId).collection('messages')
    .orderBy('ts','asc').limit(200)
    .onSnapshot(function(snap){
      var container=document.getElementById('dmMsgs');if(!container)return;
      container.innerHTML='';
      snap.forEach(function(doc){
        var m=doc.data();
        var isMine=m.senderUid===me.uid;
        var row=document.createElement('div');
        row.className='msg-row'+(isMine?' mine':'');
        if(m.deleted){
          row.innerHTML='<div style="color:var(--muted);font-style:italic;font-size:.76rem;width:100%;text-align:'+(isMine?'right':'left')+';">Message deleted</div>';
        } else {
          var av='<div class="msg-av">'+(m.senderPfp?'<img src="'+m.senderPfp+'">':((m.senderUsername||'?')[0].toUpperCase()))+'</div>';
          var bubble='<div class="msg-bubble '+(isMine?'mine-b':'theirs')+'">'+
            '<div>'+escHtml(m.text||'')+'</div>'+
            '<div class="msg-time">'+timeAgo(m.ts)+(isMine?
              ' <button onclick="deleteDMMsg(\''+chatId+'\',\''+doc.id+'\')" style="background:none;border:none;cursor:pointer;color:rgba(0,0,0,.3);padding:0;margin-left:3px;vertical-align:middle;">'+
                '<svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>'+
              '</button>':'')+
            '</div>'+
          '</div>';
          row.innerHTML=isMine?(bubble+av):(av+bubble);
        }
        container.appendChild(row);
      });
      container.scrollTop=container.scrollHeight;
    });
}

function closeDM(){
  var v=document.getElementById('dmChatView');if(v)v.remove();
  if(unsubChat){unsubChat();unsubChat=null;}
}

function sendDM(chatId){
  var inp=document.getElementById('dmInput');
  var text=(inp.value||'').trim();
  if(!text)return;
  inp.value='';
  db.collection('chats').doc(chatId).collection('messages').add({
    senderUid:me.uid,senderUsername:me.username,senderPfp:me.pfp||null,
    text:text,deleted:false,ts:firebase.firestore.FieldValue.serverTimestamp()
  });
  db.collection('chats').doc(chatId).update({
    lastMsg:text.substring(0,80),lastMsgTs:firebase.firestore.FieldValue.serverTimestamp()
  });
}

function deleteDMMsg(chatId,msgId){
  db.collection('chats').doc(chatId).collection('messages').doc(msgId).update({deleted:true,text:''});
}

// ── UTILS ──
function showToast(msg){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a24;border:2px solid var(--accent);color:var(--text);padding:11px 20px;border-radius:12px;font-family:Nunito,sans-serif;font-weight:700;font-size:.86rem;z-index:9999;max-width:300px;width:90%;text-align:center;transition:opacity .5s;';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},500);},3000);
}
function timeAgo(ts){
  if(!ts)return'';
  var d=(Date.now()-(ts.toMillis?ts.toMillis():ts))/1000;
  if(d<60)return'now';if(d<3600)return Math.floor(d/60)+'m';
  if(d<86400)return Math.floor(d/3600)+'h';return Math.floor(d/86400)+'d';
}
function escHtml(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
