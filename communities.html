<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communities — Dv's Unblocked Games</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root{--bg:#0f0f13;--surface:#1a1a24;--surface2:#13131c;--border:#2e2e3e;--accent:#00d4ff;--text:#e8e8f0;--muted:#7878a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;padding-top:56px;padding-bottom:0;overflow:hidden;height:100vh;}
#bgWrap{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 2s;}
#bgWrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;transform:scale(1.2);}

.comm-layout{position:fixed;top:52px;bottom:58px;left:0;right:0;z-index:1;display:flex;flex-direction:column;overflow:hidden;}
.comm-hero{background:linear-gradient(135deg,#1a0a2e,#13132a);border-bottom:1px solid var(--border);padding:11px 16px;flex-shrink:0;}
.comm-hero-top{display:flex;align-items:center;justify-content:space-between;}
.comm-hero h1{font-size:1.05rem;font-weight:900;display:flex;align-items:center;gap:7px;}
.comm-hero p{color:var(--muted);font-size:.72rem;margin-top:2px;}
.comm-tabs{display:flex;border-bottom:2px solid var(--border);flex-shrink:0;background:var(--surface2);}
.comm-tab{flex:1;padding:10px 6px;background:none;border:none;color:var(--muted);font-weight:900;font-size:.76rem;cursor:pointer;font-family:'Nunito',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;align-items:center;justify-content:center;gap:4px;}
.comm-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.comm-body{flex:1;overflow-y:auto;padding:12px;}

/* COMMUNITY CARDS */
.comm-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.comm-card:hover{border-color:rgba(0,212,255,.4);}
.comm-banner-strip{width:100%;height:68px;object-fit:cover;display:block;}
.comm-card-body{padding:10px 13px 12px;}
.comm-card-top{display:flex;align-items:flex-end;gap:10px;margin-top:-22px;margin-bottom:8px;}
.comm-icon{width:46px;height:46px;border-radius:11px;border:3px solid var(--surface);overflow:hidden;flex-shrink:0;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
.comm-icon img{width:100%;height:100%;object-fit:cover;}
.comm-name{font-weight:900;font-size:.92rem;flex:1;padding-bottom:2px;}
.join-btn{padding:6px 14px;border:none;border-radius:7px;font-weight:900;font-size:.74rem;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0;}
.join-btn.joined{background:rgba(46,213,115,.15);color:#2ed573;border:1px solid #2ed573;}
.join-btn.notjoined{background:var(--accent);color:#000;}
.comm-desc{font-size:.74rem;color:var(--muted);line-height:1.4;margin-bottom:6px;}
.comm-meta{display:flex;align-items:center;gap:8px;font-size:.7rem;color:var(--muted);}
.comm-tag{font-size:.58rem;background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.3);color:var(--accent);padding:2px 7px;border-radius:4px;font-weight:900;}

/* CREATE FORM */
.create-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
.create-title{font-weight:900;font-size:.88rem;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.f-input{width:100%;padding:9px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:.86rem;font-family:'Nunito',sans-serif;outline:none;margin-bottom:8px;}
.f-input:focus{border-color:var(--accent);}
.f-label{font-size:.72rem;color:var(--muted);font-weight:700;margin-bottom:4px;}
.icon-preview{width:52px;height:52px;border-radius:12px;background:var(--surface2);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;overflow:hidden;cursor:pointer;margin-bottom:8px;}
.icon-preview img{width:100%;height:100%;object-fit:cover;}
.create-btn{width:100%;padding:10px;background:var(--accent);color:#000;border:none;border-radius:9px;font-weight:900;font-size:.86rem;cursor:pointer;font-family:'Nunito',sans-serif;}

/* COMMUNITY FULLSCREEN VIEW */
.comm-view{position:fixed;inset:0;z-index:600;background:var(--bg);display:flex;flex-direction:column;font-family:'Nunito',sans-serif;}
.comm-topbar{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;min-height:52px;}
.comm-topbar-icon{width:34px;height:34px;border-radius:9px;overflow:hidden;flex-shrink:0;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.95rem;}
.comm-topbar-icon img{width:100%;height:100%;object-fit:cover;}
.comm-topbar-name{font-weight:900;font-size:.9rem;}
.comm-topbar-sub{font-size:.66rem;color:var(--muted);}
.tb-btn{background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--muted);padding:5px 9px;font-size:.72rem;font-weight:900;font-family:'Nunito',sans-serif;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.tb-btn:hover{color:var(--text);border-color:rgba(255,255,255,.3);}

/* INNER LAYOUT */
.comm-inner{flex:1;display:flex;overflow:hidden;}
.comm-sidebar{width:190px;background:var(--surface2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sidebar-sec{padding:10px 8px 4px;}
.sidebar-sec-title{font-size:.62rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:0 5px;margin-bottom:5px;}
.ch-btn{display:flex;align-items:center;gap:6px;width:100%;padding:7px 9px;background:none;border:none;border-radius:8px;color:var(--muted);font-size:.82rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;text-align:left;}
.ch-btn:hover{background:rgba(255,255,255,.05);color:var(--text);}
.ch-btn.active{background:rgba(0,212,255,.12);color:var(--accent);}
.ch-hash{opacity:.55;font-size:.88rem;}
.add-ch-btn{display:flex;align-items:center;gap:5px;width:100%;padding:5px 9px;background:none;border:none;border-radius:8px;color:var(--muted);font-size:.76rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:2px;}
.add-ch-btn:hover{color:var(--accent);}
.leave-btn{margin:auto 10px 10px;padding:7px 10px;background:none;border:1px solid #ff4757;color:#ff4757;border-radius:8px;font-size:.76rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;}

/* MAIN AREA */
.comm-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.ch-header{padding:9px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.ch-header-name{font-weight:900;font-size:.88rem;display:flex;align-items:center;gap:5px;}
.ch-header-desc{font-size:.7rem;color:var(--muted);}
.comm-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:2px;}

/* MESSAGES */
.cmsg{display:flex;gap:8px;align-items:flex-start;padding:4px 2px;border-radius:8px;transition:background .1s;-webkit-user-select:none;user-select:none;}
.cmsg:active{background:rgba(255,255,255,.04);}
.cmsg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.74rem;color:#000;margin-top:2px;}
.cmsg-av img{width:100%;height:100%;object-fit:cover;}
.cmsg-body{flex:1;min-width:0;}
.cmsg-header{display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap;}
.cmsg-name{font-weight:900;font-size:.82rem;}
.cmsg-time{font-size:.62rem;color:var(--muted);}
.cmsg-text{font-size:.84rem;line-height:1.5;word-break:break-word;color:var(--text);}
.cmsg-img{max-width:230px;border-radius:10px;margin-top:5px;display:block;cursor:pointer;}
.cmsg-deleted{color:var(--muted);font-style:italic;font-size:.78rem;}
.reply-quote{background:rgba(0,212,255,.07);border-left:3px solid var(--accent);border-radius:4px;padding:4px 8px;margin-bottom:4px;cursor:pointer;}
.reply-quote-who{font-size:.66rem;color:var(--accent);font-weight:900;}
.reply-quote-text{font-size:.72rem;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
.cmsg-reactions{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.react-pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:2px 8px;cursor:pointer;font-size:.8rem;color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;display:inline-flex;align-items:center;gap:3px;transition:background .1s;}
.react-pill.mine{background:rgba(0,212,255,.18);border-color:var(--accent);}
.comm-role-badge{font-size:.55rem;padding:2px 6px;border-radius:4px;font-weight:900;}

/* EMOJI SHELF */
.emoji-shelf{display:flex;gap:5px;padding:6px 12px;border-top:1px solid var(--border);background:var(--surface2);overflow-x:auto;flex-shrink:0;}
.emoji-shelf::-webkit-scrollbar{height:3px;}
.shelf-emoji{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:4px 5px;border-radius:7px;flex-shrink:0;}
.shelf-emoji:hover{background:rgba(255,255,255,.1);}
.shelf-emoji img{width:22px;height:22px;object-fit:contain;border-radius:4px;vertical-align:middle;}

/* REPLY BAR */
.reply-bar{display:none;background:#0d1a2a;border-top:2px solid var(--accent);padding:6px 12px;flex-shrink:0;align-items:center;gap:8px;}
.reply-bar-inner{flex:1;min-width:0;}
.reply-bar-label{font-size:.66rem;color:var(--accent);font-weight:900;}
.reply-bar-preview{font-size:.74rem;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reply-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;padding:0 4px;flex-shrink:0;}

/* INPUT */
.comm-input-bar{padding:8px 10px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-shrink:0;}
.comm-input{flex:1;padding:9px 13px;background:var(--bg);border:1.5px solid var(--border);border-radius:999px;color:var(--text);font-size:.84rem;font-family:'Nunito',sans-serif;outline:none;}
.comm-input:focus{border-color:var(--accent);}
.icon-btn{width:34px;height:34px;background:rgba(255,255,255,.06);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--muted);}
.icon-btn:hover{background:rgba(255,255,255,.14);}
.send-btn{width:36px;height:36px;background:var(--accent);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* MEMBERS PANEL */
.comm-members{width:0;overflow:hidden;background:var(--surface2);border-left:1px solid var(--border);transition:width .2s;flex-shrink:0;}
.comm-members.open{width:160px;overflow-y:auto;}
.cm-sec{padding:10px 9px 4px;}
.cm-sec-title{font-size:.62rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:0 4px;margin-bottom:5px;}
.cm-member{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:7px;}
.cm-av{width:26px;height:26px;border-radius:50%;overflow:hidden;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:900;color:#000;flex-shrink:0;}
.cm-av img{width:100%;height:100%;object-fit:cover;}
.cm-name{font-size:.76rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* LONG PRESS MENU */
.ctx-menu{position:fixed;z-index:9000;background:#1a1a24;border:2px solid #2e2e3e;border-radius:16px;padding:10px;box-shadow:0 10px 40px rgba(0,0,0,.95);min-width:200px;font-family:'Nunito',sans-serif;animation:ctxIn .15s ease;}
@keyframes ctxIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.ctx-emoji-row{display:flex;gap:4px;padding:6px 4px 10px;border-bottom:1px solid #2e2e3e;margin-bottom:6px;flex-wrap:wrap;}
.ctx-emoji-btn{background:none;border:none;font-size:1.35rem;cursor:pointer;padding:4px 6px;border-radius:9px;transition:background .1s;}
.ctx-emoji-btn:hover{background:rgba(255,255,255,.12);}
.ctx-action{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;cursor:pointer;font-size:.84rem;font-weight:700;color:var(--text);}
.ctx-action:hover{background:rgba(255,255,255,.07);}
.ctx-action.danger{color:#ff4757;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;}
.modal-box{background:#1a1a24;border:2px solid #2e2e3e;border-radius:16px;padding:20px;width:92%;max-width:340px;}
.modal-title{font-weight:900;font-size:.96rem;color:var(--accent);margin-bottom:14px;}
.modal-input{width:100%;padding:9px 12px;background:#0f0f13;border:1.5px solid #2e2e3e;border-radius:9px;color:#e8e8f0;font-size:.86rem;font-family:'Nunito',sans-serif;outline:none;margin-bottom:8px;}
.modal-input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;margin-top:10px;}
.modal-btn{flex:1;padding:9px;border:none;border-radius:9px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.84rem;}
.modal-btn.primary{background:var(--accent);color:#000;}
.modal-btn.secondary{background:#2e2e3e;color:#e8e8f0;}

/* SETTINGS PANEL */
.settings-panel{position:fixed;inset:0;z-index:7000;background:var(--bg);overflow-y:auto;font-family:'Nunito',sans-serif;}
.sp-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
.sp-body{max-width:560px;margin:0 auto;padding:16px 14px 80px;}
.sp-section{background:var(--surface);border:1.5px solid var(--border);border-radius:13px;padding:14px;margin-bottom:12px;}
.sp-section-title{font-weight:900;font-size:.86rem;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* IMAGE VIEWER */
.img-viewer{position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,.97);display:flex;align-items:center;justify-content:center;}
.img-viewer img{max-width:95vw;max-height:90vh;border-radius:10px;object-fit:contain;}
.img-viewer-close{position:absolute;top:16px;right:16px;background:#2e2e3e;border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:11px 20px;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.86rem;z-index:99999;max-width:300px;width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.6);pointer-events:none;transition:opacity .4s;background:#1a1a24;border:2px solid var(--accent);color:var(--text);}

.no-items{text-align:center;color:var(--muted);padding:40px 16px;font-size:.86rem;}
</style>
</head>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
// ══════════════════════════════════════════
//  GLOBALS
// ══════════════════════════════════════════
var me = null;
var allComms = [];
var currentTab = 'discover';
var currentCommId = null;
var currentChannelId = null;
var currentComm = null;
var unsubMsgs = null;
var replyTo = null;
var membersOpen = false;
var pressTimer = null;
var pressTarget = null;
var ROLE_RANK = {owner:5,developer:4,admin:3,mod:2,helper:1,user:0};
var DEFAULT_EMOJIS = ['👍','❤️','😂','😮','🔥','💯','🎮','😎'];

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ago(ts){
  if(!ts)return'';
  var s=(Date.now()-(ts.toMillis?ts.toMillis():ts))/1000;
  if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';
}
function toast(msg,col){
  col=col||'#00d4ff';
  var t=document.createElement('div');t.className='toast';t.style.borderColor=col;t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},400);},2800);
}
function closeModal(id){var el=document.getElementById(id);if(el)el.remove();}
function doLogout(){
  try{localStorage.removeItem('dvs_uid');localStorage.removeItem('dvs_ts');}catch(e){}
  auth.signOut().then(function(){location.href='index.html';});
}
function siteRole(u){
  if(!u)return'user';
  if(u.role==='owner'||u.isOwner)return'owner';
  if(u.role==='developer'||u.isDeveloper)return'developer';
  if(u.role==='admin'||u.isAdmin)return'admin';
  if(u.role==='mod'||u.isMod)return'mod';
  if(u.role==='helper'||u.isHelper)return'helper';
  return'user';
}
function siteRank(){return ROLE_RANK[siteRole(me)]||0;}
function myCommRole(comm){
  if(!comm)return'member';
  var m=(comm.members||[]).find(function(x){return x.uid===me.uid;});
  return m?m.commRole||'member':'member';
}
function commRoleDef(comm,roleId){return(comm.commRoles||[]).find(function(r){return r.id===roleId;});}
function canManageComm(comm){
  var r=myCommRole(comm);
  return r==='owner'||r==='admin'||siteRank()>=3;
}
function canDeleteMsg(comm,msg){
  return msg.senderUid===me.uid||canManageComm(comm)||myCommRole(comm)==='mod'||siteRank()>=2;
}
function isMember(comm){return comm&&comm.memberUids&&comm.memberUids.includes(me.uid);}

// ══════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════
auth.onAuthStateChanged(function(fu){
  if(!fu){
    var saved=null;
    try{var uid=localStorage.getItem('dvs_uid');var ts=parseInt(localStorage.getItem('dvs_ts')||'0');if(uid&&Date.now()-ts<172800000)saved=uid;}catch(e){}
    if(saved){db.collection('users').doc(saved).get().then(function(d){if(d.exists){boot(Object.assign({uid:saved},d.data()));}else{location.href='index.html';}});}
    else location.href='index.html';
    return;
  }
  db.collection('users').doc(fu.uid).get().then(function(d){
    if(!d.exists){location.href='index.html';return;}
    boot(Object.assign({uid:fu.uid},d.data()));
  });
});

function boot(user){
  me=user;
  var av=document.getElementById('navAvatar');
  av.innerHTML=me.pfp?'<img src="'+me.pfp+'" style="width:100%;height:100%;object-fit:cover;">':me.username[0].toUpperCase();
  document.getElementById('navUsername').textContent=me.username;
  var bg=document.getElementById('bgWrap');if(bg)bg.style.opacity='0.18';
  loadComms();
}

// ══════════════════════════════════════════
//  LOAD COMMUNITIES
// ══════════════════════════════════════════
function loadComms(){
  db.collection('communities').get().then(function(snap){
    allComms=[];
    snap.forEach(function(d){allComms.push(Object.assign({id:d.id},d.data()));});
    allComms.sort(function(a,b){return(b.memberCount||0)-(a.memberCount||0);});
    renderTab(currentTab);
  }).catch(function(e){toast('Load error: '+e.message,'#ff4757');});
}

// ══════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.comm-tab').forEach(function(b){b.classList.remove('active');});
  var el=document.getElementById('tab-'+tab);if(el)el.classList.add('active');
  renderTab(tab);
}

function renderTab(tab){
  var body=document.getElementById('commBody');if(!body)return;
  body.innerHTML='';
  if(tab==='discover') renderDiscover(body);
  else if(tab==='joined') renderJoined(body);
  else if(tab==='create') renderCreate(body);
}

// ── DISCOVER ──
function renderDiscover(body){
  if(!allComms.length){body.innerHTML='<div class="no-items">No communities yet.<br>Be the first to create one!</div>';return;}
  allComms.forEach(function(c){body.appendChild(makeCard(c));});
}

// ── JOINED ──
function renderJoined(body){
  var joined=allComms.filter(isMember);
  if(!joined.length){
    body.innerHTML='<div class="no-items">You haven\'t joined any communities yet.<br><br><button onclick="switchTab(\'discover\')" style="background:var(--accent);color:#000;border:none;padding:9px 20px;border-radius:9px;font-weight:900;cursor:pointer;font-family:Nunito,sans-serif;">Browse Communities</button></div>';
    return;
  }
  joined.forEach(function(c){body.appendChild(makeCard(c));});
}

// ── CREATE ──
var newCommIcon=null;
function renderCreate(body){
  newCommIcon=null;
  var div=document.createElement('div');div.className='create-card';
  div.innerHTML=
    '<div class="create-title"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Create a Community</div>'+
    '<div class="f-label">Community Icon</div>'+
    '<div id="newIconPreview" class="icon-preview" onclick="document.getElementById(\'newIconFile\').click()" title="Upload icon">🎮</div>'+
    '<input type="file" id="newIconFile" accept="image/*" style="display:none;" onchange="handleNewIcon(this)">'+
    '<input class="f-input" id="newCommName" placeholder="Community name">'+
    '<textarea class="f-input" id="newCommDesc" rows="2" placeholder="What is this community about?" style="resize:none;"></textarea>'+
    '<input class="f-input" id="newCommTag" placeholder="Game tag (e.g. Minecraft, FNF)">'+
    '<div class="f-label">Banner color</div>'+
    '<input type="color" id="newCommColor" value="#1a237e" style="width:100%;height:36px;border:none;border-radius:8px;cursor:pointer;background:none;margin-bottom:10px;">'+
    '<button class="create-btn" onclick="createComm()">🚀 Create Community</button>';
  body.appendChild(div);
}

function handleNewIcon(inp){
  var file=inp.files[0];if(!file)return;
  if(file.size>2097152){toast('Icon must be under 2MB!','#ff4757');return;}
  var r=new FileReader();
  r.onload=function(e){
    newCommIcon=e.target.result;
    var p=document.getElementById('newIconPreview');
    if(p)p.innerHTML='<img src="'+newCommIcon+'">';
  };
  r.readAsDataURL(file);inp.value='';
}

function createComm(){
  var name=(document.getElementById('newCommName').value||'').trim();
  var desc=(document.getElementById('newCommDesc').value||'').trim();
  var tag=(document.getElementById('newCommTag').value||'').trim();
  var color=document.getElementById('newCommColor').value||'#1a237e';
  if(!name){toast('Enter a community name!','#ff4757');return;}
  var data={
    name:name,description:desc,gameTag:tag,icon:newCommIcon||null,
    bannerColor:color,ownerUid:me.uid,ownerUsername:me.username,
    memberUids:[me.uid],memberCount:1,
    members:[{uid:me.uid,username:me.username,pfp:me.pfp||null,commRole:'owner'}],
    customEmojis:[],
    commRoles:[
      {id:'owner',name:'Owner',color:'#FFD700',permissions:{manageChannels:true,manageMembers:true,deleteMessages:true,banMembers:true}},
      {id:'admin',name:'Admin',color:'#00d4ff',permissions:{manageChannels:true,manageMembers:true,deleteMessages:true,banMembers:false}},
      {id:'mod',name:'Mod',color:'#8e24aa',permissions:{manageChannels:false,manageMembers:false,deleteMessages:true,banMembers:false}},
      {id:'member',name:'Member',color:'#7878a0',permissions:{}}
    ],
    bannedUids:[],
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  db.collection('communities').add(data).then(function(ref){
    var batch=db.batch();
    ['general','announcements','off-topic'].forEach(function(n,i){
      var ch=db.collection('communities').doc(ref.id).collection('channels').doc();
      batch.set(ch,{name:n,description:'',type:'text',order:i,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    });
    return batch.commit().then(function(){return ref.id;});
  }).then(function(id){
    newCommIcon=null;toast('Community created!');
    loadComms();setTimeout(function(){openComm(id);},500);
  }).catch(function(e){toast('Error: '+e.message,'#ff4757');});
}

// ══════════════════════════════════════════
//  COMMUNITY CARD
// ══════════════════════════════════════════
function makeCard(comm){
  var div=document.createElement('div');div.className='comm-card';
  var joined=isMember(comm);
  var iconHtml=comm.icon?'<img src="'+esc(comm.icon)+'" alt="">':'🎮';
  div.innerHTML=
    '<div class="comm-banner-strip" style="background:linear-gradient(135deg,'+(comm.bannerColor||'#1a237e')+',#0f0f13);"></div>'+
    '<div class="comm-card-body">'+
      '<div class="comm-card-top">'+
        '<div class="comm-icon">'+iconHtml+'</div>'+
        '<div class="comm-name">'+esc(comm.name)+'</div>'+
        '<button class="join-btn '+(joined?'joined':'notjoined')+'" onclick="event.stopPropagation();btnAction(\''+comm.id+'\','+joined+')">'+
          (joined?'▶ Open':'+ Join')+
        '</button>'+
      '</div>'+
      '<div class="comm-desc">'+esc((comm.description||'').substring(0,100))+'</div>'+
      '<div class="comm-meta">'+
        '<svg width="11" height="11" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>'+
        (comm.memberCount||0)+' members'+
        (comm.gameTag?'<span class="comm-tag">'+esc(comm.gameTag)+'</span>':'')+
      '</div>'+
    '</div>';
  div.onclick=function(){if(joined)openComm(comm.id);else joinComm(comm.id);};
  return div;
}
function btnAction(id,joined){if(joined)openComm(id);else joinComm(id);}

// ══════════════════════════════════════════
//  JOIN
// ══════════════════════════════════════════
function joinComm(commId){
  var comm=allComms.find(function(c){return c.id===commId;});
  if(!comm)return;
  if((comm.bannedUids||[]).includes(me.uid)){toast('You are banned from this community.','#ff4757');return;}
  db.collection('communities').doc(commId).update({
    memberUids:firebase.firestore.FieldValue.arrayUnion(me.uid),
    memberCount:firebase.firestore.FieldValue.increment(1),
    members:firebase.firestore.FieldValue.arrayUnion({uid:me.uid,username:me.username,pfp:me.pfp||null,commRole:'member'})
  }).then(function(){toast('Joined!');loadComms();setTimeout(function(){openComm(commId);},400);});
}

// ══════════════════════════════════════════
//  OPEN COMMUNITY
// ══════════════════════════════════════════
function openComm(commId){
  currentCommId=commId;
  db.collection('communities').doc(commId).get().then(function(doc){
    if(!doc.exists){toast('Not found!','#ff4757');return;}
    currentComm=Object.assign({id:commId},doc.data());
    db.collection('communities').doc(commId).collection('channels').orderBy('order','asc').get().then(function(snap){
      var channels=[];snap.forEach(function(d){channels.push(Object.assign({id:d.id},d.data()));});
      buildCommView(currentComm,channels);
    }).catch(function(){
      db.collection('communities').doc(commId).collection('channels').get().then(function(snap){
        var channels=[];snap.forEach(function(d){channels.push(Object.assign({id:d.id},d.data()));});
        channels.sort(function(a,b){return(a.order||0)-(b.order||0);});
        buildCommView(currentComm,channels);
      });
    });
  });
}

// ══════════════════════════════════════════
//  BUILD COMMUNITY VIEW
// ══════════════════════════════════════════
function buildCommView(comm,channels){
  var ex=document.getElementById('commView');if(ex)ex.remove();
  if(unsubMsgs){unsubMsgs();unsubMsgs=null;}
  replyTo=null;membersOpen=false;

  var canManage=canManageComm(comm);
  var iconHtml=comm.icon?'<img src="'+esc(comm.icon)+'" alt="">':'🎮';

  var view=document.createElement('div');view.id='commView';view.className='comm-view';
  view.innerHTML=
    // TOPBAR
    '<div class="comm-topbar">'+
      '<button onclick="closeCommView()" style="background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;flex-shrink:0;"><svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>'+
      '<div class="comm-topbar-icon">'+iconHtml+'</div>'+
      '<div style="flex:1;min-width:0;">'+
        '<div class="comm-topbar-name">'+esc(comm.name)+'</div>'+
        '<div class="comm-topbar-sub">'+(comm.memberCount||0)+' members</div>'+
      '</div>'+
      (canManage?'<button class="tb-btn" onclick="openSettings()">⚙️ Manage</button>':'')+
      '<button class="tb-btn" onclick="toggleMembers()"><svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></button>'+
    '</div>'+
    // INNER
    '<div class="comm-inner">'+
      // SIDEBAR
      '<div class="comm-sidebar">'+
        '<div class="sidebar-sec">'+
          '<div class="sidebar-sec-title">Channels</div>'+
          '<div id="channelList"></div>'+
          (canManage?'<button class="add-ch-btn" onclick="promptAddChannel()"><svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> Add Channel</button>':'')+
        '</div>'+
        '<button class="leave-btn" onclick="leaveComm()">Leave Community</button>'+
      '</div>'+
      // MAIN
      '<div class="comm-main">'+
        '<div class="ch-header"><div class="ch-header-name" id="chName"># general</div><div class="ch-header-desc" id="chDesc"></div></div>'+
        '<div class="comm-msgs" id="commMsgs"></div>'+
        '<div class="emoji-shelf" id="emojiShelf"></div>'+
        '<div class="reply-bar" id="replyBar">'+
          '<div class="reply-bar-inner"><div class="reply-bar-label" id="replyLabel">↩ Replying...</div><div class="reply-bar-preview" id="replyPreview"></div></div>'+
          '<button class="reply-x" onclick="clearReply()">×</button>'+
        '</div>'+
        '<div class="comm-input-bar">'+
          '<button class="icon-btn" onclick="pickImage()" title="Image/GIF"><svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></button>'+
          '<input class="comm-input" id="commInput" placeholder="Message..." onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendMsg();}">'+
          '<button class="send-btn" onclick="sendMsg()"><svg width="16" height="16" fill="#000" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>'+
        '</div>'+
      '</div>'+
      // MEMBERS
      '<div class="comm-members" id="memberPanel"></div>'+
    '</div>';

  document.body.appendChild(view);
  buildChannelList(channels,comm);
  buildMemberPanel(comm);
  buildEmojiShelf(comm);
  if(channels.length)selectChannel(channels[0],comm);
}

function closeCommView(){
  var v=document.getElementById('commView');if(v)v.remove();
  if(unsubMsgs){unsubMsgs();unsubMsgs=null;}
  currentCommId=null;currentChannelId=null;currentComm=null;replyTo=null;
}

// ══════════════════════════════════════════
//  CHANNELS
// ══════════════════════════════════════════
function buildChannelList(channels,comm){
  var list=document.getElementById('channelList');if(!list)return;
  list.innerHTML='';
  channels.forEach(function(ch){
    var btn=document.createElement('button');
    btn.className='ch-btn';btn.dataset.chid=ch.id;
    btn.innerHTML='<span class="ch-hash">#</span>'+esc(ch.name);
    btn.onclick=function(){
      document.querySelectorAll('.ch-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      selectChannel(ch,comm);
    };
    list.appendChild(btn);
  });
  if(list.firstChild)list.firstChild.classList.add('active');
}

function selectChannel(ch,comm){
  currentChannelId=ch.id;
  var n=document.getElementById('chName');if(n)n.textContent='# '+ch.name;
  var d=document.getElementById('chDesc');if(d)d.textContent=ch.description||'';
  var inp=document.getElementById('commInput');if(inp)inp.placeholder='Message #'+ch.name+'...';
  listenMsgs(comm.id,ch.id,comm);
}

function promptAddChannel(){
  var name=prompt('Channel name (use-hyphens):','');
  if(!name||!name.trim())return;
  name=name.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'');
  if(!name)return;
  var desc=prompt('Description (optional):','');
  db.collection('communities').doc(currentCommId).collection('channels').add({
    name:name,description:desc||'',type:'text',
    order:Date.now(),createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(ref){
    var list=document.getElementById('channelList');
    if(list){
      var btn=document.createElement('button');
      btn.className='ch-btn';btn.dataset.chid=ref.id;
      btn.innerHTML='<span class="ch-hash">#</span>'+esc(name);
      btn.onclick=function(){
        document.querySelectorAll('.ch-btn').forEach(function(b){b.classList.remove('active');});
        btn.classList.add('active');
        selectChannel({id:ref.id,name:name,description:desc||''},currentComm);
      };
      var addBtn=list.nextElementSibling;
      list.appendChild(btn);
    }
    toast('#'+name+' created!');
  });
}

// ══════════════════════════════════════════
//  MESSAGES — LISTEN
// ══════════════════════════════════════════
function listenMsgs(commId,channelId,comm){
  if(unsubMsgs){unsubMsgs();unsubMsgs=null;}
  unsubMsgs=db.collection('communities').doc(commId)
    .collection('channels').doc(channelId)
    .collection('messages').orderBy('ts','asc').limit(200)
    .onSnapshot(function(snap){
      var container=document.getElementById('commMsgs');if(!container)return;
      var atBottom=container.scrollHeight-container.scrollTop-container.clientHeight<80;
      container.innerHTML='';
      snap.forEach(function(d){
        container.appendChild(makeMsgRow(Object.assign({id:d.id},d.data()),commId,channelId,comm));
      });
      if(atBottom)container.scrollTop=container.scrollHeight;
    });
}

// ══════════════════════════════════════════
//  MESSAGE ROW
// ══════════════════════════════════════════
function makeMsgRow(m,commId,channelId,comm){
  var row=document.createElement('div');row.className='cmsg';row.dataset.msgid=m.id;

  if(m.deleted){
    row.innerHTML='<div class="cmsg-deleted" style="padding-left:40px;">Message deleted</div>';
    return row;
  }

  // Member role in community
  var mem=(comm.members||[]).find(function(x){return x.uid===m.senderUid;});
  var cRole=mem?mem.commRole||'member':'member';
  var cRoleDef=commRoleDef(comm,cRole);
  var roleBadge=(cRoleDef&&cRoleDef.id!=='member')
    ?'<span class="comm-role-badge" style="background:'+(cRoleDef.color||'#aaa')+';color:'+(cRoleDef.id==='owner'?'#000':'#fff')+';">'+esc(cRoleDef.name)+'</span>'
    :'';

  // Reply quote
  var rqHtml='';
  if(m.replyTo){
    rqHtml='<div class="reply-quote" onclick="scrollToMsg(\''+m.replyTo.msgId+'\')">'+
      '<div class="reply-quote-who">↩ @'+esc(m.replyTo.senderUsername||'?')+'</div>'+
      '<div class="reply-quote-text">'+esc((m.replyTo.text||'[Image]').substring(0,70))+'</div>'+
    '</div>';
  }

  // Content
  var contentHtml='';
  if(m.type==='image'){
    contentHtml='<img class="cmsg-img" src="'+esc(m.imageUrl||'')+'" alt="img" onclick="viewImg(\''+esc(m.imageUrl||'')+'\')"/>';
  }else{
    contentHtml='<div class="cmsg-text">'+esc(m.text||'')+'</div>';
  }

  // Reactions
  var reactions=m.reactions||{};
  var reactHtml='';
  var rKeys=Object.keys(reactions).filter(function(e){return reactions[e]&&reactions[e].length;});
  if(rKeys.length){
    reactHtml='<div class="cmsg-reactions">';
    rKeys.forEach(function(emoji){
      var users=reactions[emoji];
      var mine=users.includes(me.uid);
      reactHtml+='<button class="react-pill'+(mine?' mine':'')+'" onclick="toggleReaction(\''+commId+'\',\''+channelId+'\',\''+m.id+'\',\''+esc(emoji)+'\')">'+esc(emoji)+' <span style="font-size:.7rem;">'+users.length+'</span></button>';
    });
    reactHtml+='</div>';
  }

  var avHtml='<div class="cmsg-av">'+(m.senderPfp?'<img src="'+esc(m.senderPfp)+'" alt="">':esc((m.senderUsername||'?')[0].toUpperCase()))+'</div>';

  row.innerHTML=
    avHtml+
    '<div class="cmsg-body">'+
      '<div class="cmsg-header">'+
        '<span class="cmsg-name">@'+esc(m.senderUsername||'?')+'</span>'+
        roleBadge+
        '<span class="cmsg-time">'+ago(m.ts)+'</span>'+
      '</div>'+
      rqHtml+
      contentHtml+
      reactHtml+
    '</div>';

  // LONG PRESS
  attachPress(row,m,commId,channelId,comm);
  return row;
}

function scrollToMsg(msgId){
  var el=document.querySelector('[data-msgid="'+msgId+'"]');
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.background='rgba(0,212,255,.1)';setTimeout(function(){el.style.background='';},1500);}
}

// ══════════════════════════════════════════
//  LONG PRESS — CONTEXT MENU
// ══════════════════════════════════════════
function attachPress(el,m,commId,channelId,comm){
  var timer=null;
  var moved=false;

  function start(e){
    moved=false;
    timer=setTimeout(function(){
      if(!moved)showCtxMenu(m,commId,channelId,comm,el);
    },420);
  }
  function cancel(){clearTimeout(timer);}
  function move(){moved=true;clearTimeout(timer);}

  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',cancel);
  el.addEventListener('touchmove',move,{passive:true});
  el.addEventListener('mousedown',start);
  el.addEventListener('mouseup',cancel);
  el.addEventListener('mouseleave',cancel);
  el.addEventListener('contextmenu',function(e){e.preventDefault();showCtxMenu(m,commId,channelId,comm,el);});
}

function showCtxMenu(m,commId,channelId,comm,anchor){
  // Remove any existing menu
  var ex=document.getElementById('ctxMenu');if(ex)ex.remove();

  var canDel=canDeleteMsg(comm,m);
  var isMine=m.senderUid===me.uid;
  var canBan=canManageComm(comm)&&!isMine;

  var menu=document.createElement('div');
  menu.id='ctxMenu';menu.className='ctx-menu';

  // ── EMOJI ROW ──
  var emojiRow=document.createElement('div');emojiRow.className='ctx-emoji-row';
  var emojis=DEFAULT_EMOJIS.concat((comm.customEmojis||[]).map(function(e){return e.emoji||':'+e.name+':';}));
  emojis.slice(0,9).forEach(function(emoji){
    var btn=document.createElement('button');btn.className='ctx-emoji-btn';
    btn.textContent=emoji;
    btn.onclick=function(){toggleReaction(commId,channelId,m.id,emoji);menu.remove();};
    emojiRow.appendChild(btn);
  });
  // Custom emoji button
  var customEmojiBtn=document.createElement('button');customEmojiBtn.className='ctx-emoji-btn';customEmojiBtn.textContent='✏️';
  customEmojiBtn.title='Custom reaction';
  customEmojiBtn.onclick=function(){
    var e=prompt('Enter custom emoji or reaction:','');
    if(e&&e.trim()){toggleReaction(commId,channelId,m.id,e.trim());menu.remove();}
  };
  emojiRow.appendChild(customEmojiBtn);
  menu.appendChild(emojiRow);

  // ── ACTION ROWS ──
  function addAction(icon,label,fn,danger){
    var row=document.createElement('div');
    row.className='ctx-action'+(danger?' danger':'');
    row.innerHTML=icon+' <span>'+label+'</span>';
    row.onclick=function(){fn();menu.remove();};
    menu.appendChild(row);
  }

  if(!m.deleted){
    addAction('↩','Reply',function(){setReply(m.id,m.senderUsername,m.type==='image'?'[Image]':m.text);});
    if(isMine||canDel){
      addAction('📋','Copy text',function(){
        navigator.clipboard&&navigator.clipboard.writeText(m.text||'').catch(function(){});
        toast('Copied!');
      });
    }
    if(canDel) addAction('🗑','Delete message',function(){deleteMsg(commId,channelId,m.id);},true);
    if(canBan) addAction('🔨','Ban from community',function(){banUser(commId,m.senderUid,m.senderUsername);},true);
  }

  // POSITION — near the tapped element
  var rect=anchor.getBoundingClientRect();
  var menuH=340;
  var top=rect.top-menuH-6;
  if(top<8)top=rect.bottom+6;
  if(top+menuH>window.innerHeight-8)top=window.innerHeight-menuH-8;
  var left=Math.min(Math.max(rect.left,8),window.innerWidth-210);
  menu.style.top=top+'px';
  menu.style.left=left+'px';

  document.body.appendChild(menu);

  // Close on outside click
  setTimeout(function(){
    document.addEventListener('click',function outsideClick(e){
      if(!menu.contains(e.target)){menu.remove();document.removeEventListener('click',outsideClick);}
    });
  },100);
}

// ══════════════════════════════════════════
//  REACTIONS
// ══════════════════════════════════════════
function toggleReaction(commId,channelId,msgId,emoji){
  if(!me)return;
  var ref=db.collection('communities').doc(commId)
    .collection('channels').doc(channelId)
    .collection('messages').doc(msgId);
  ref.get().then(function(doc){
    if(!doc.exists)return;
    var reactions=Object.assign({},doc.data().reactions||{});
    var users=(reactions[emoji]||[]).slice();
    if(users.includes(me.uid)){users=users.filter(function(id){return id!==me.uid;});}
    else{users.push(me.uid);}
    if(!users.length){delete reactions[emoji];}else{reactions[emoji]=users;}
    ref.update({reactions:reactions});
  });
}

// ══════════════════════════════════════════
//  REPLY
// ══════════════════════════════════════════
function setReply(msgId,senderUsername,text){
  replyTo={msgId:msgId,senderUsername:senderUsername,text:text};
  var bar=document.getElementById('replyBar');if(bar)bar.style.display='flex';
  var lbl=document.getElementById('replyLabel');if(lbl)lbl.textContent='↩ Replying to @'+(senderUsername||'?');
  var pre=document.getElementById('replyPreview');if(pre)pre.textContent=(text||'').substring(0,60);
  var inp=document.getElementById('commInput');if(inp)inp.focus();
}
function clearReply(){
  replyTo=null;
  var bar=document.getElementById('replyBar');if(bar)bar.style.display='none';
}

// ══════════════════════════════════════════
//  SEND MESSAGE
// ══════════════════════════════════════════
function sendMsg(){
  if(!currentCommId||!currentChannelId)return;
  var inp=document.getElementById('commInput');
  var text=(inp.value||'').trim();if(!text)return;
  inp.value='';
  db.collection('communities').doc(currentCommId)
    .collection('channels').doc(currentChannelId)
    .collection('messages').add({
      senderUid:me.uid,senderUsername:me.username,senderPfp:me.pfp||null,
      type:'text',text:text,deleted:false,reactions:{},
      replyTo:replyTo||null,
      ts:firebase.firestore.FieldValue.serverTimestamp()
    });
  clearReply();
}

function deleteMsg(commId,channelId,msgId){
  db.collection('communities').doc(commId)
    .collection('channels').doc(channelId)
    .collection('messages').doc(msgId)
    .update({deleted:true,text:'',imageUrl:'',reactions:{}});
}

// ══════════════════════════════════════════
//  IMAGE
// ══════════════════════════════════════════
function pickImage(){
  if(!currentCommId||!currentChannelId)return;
  var inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.style.display='none';
  inp.onchange=function(){
    var file=inp.files[0];if(!file)return;
    if(file.size>4194304){toast('Image must be under 4MB!','#ff4757');return;}
    var r=new FileReader();
    r.onload=function(e){
      db.collection('communities').doc(currentCommId)
        .collection('channels').doc(currentChannelId)
        .collection('messages').add({
          senderUid:me.uid,senderUsername:me.username,senderPfp:me.pfp||null,
          type:'image',imageUrl:e.target.result,mimeType:file.type,
          text:'',deleted:false,reactions:{},replyTo:replyTo||null,
          ts:firebase.firestore.FieldValue.serverTimestamp()
        });
      clearReply();
    };
    r.readAsDataURL(file);
  };
  document.body.appendChild(inp);inp.click();setTimeout(function(){inp.remove();},5000);
}

function viewImg(url){
  var ex=document.getElementById('imgViewer');if(ex)ex.remove();
  var v=document.createElement('div');v.id='imgViewer';v.className='img-viewer';
  v.innerHTML='<img src="'+esc(url)+'" alt="image"><button class="img-viewer-close" onclick="document.getElementById(\'imgViewer\').remove()">×</button>';
  v.onclick=function(e){if(e.target===v)v.remove();};
  document.body.appendChild(v);
}

// ══════════════════════════════════════════
//  EMOJI SHELF
// ══════════════════════════════════════════
function buildEmojiShelf(comm){
  var shelf=document.getElementById('emojiShelf');if(!shelf)return;
  shelf.innerHTML='';
  var emojis=DEFAULT_EMOJIS.concat((comm.customEmojis||[]).map(function(e){return e.emoji||e.name;}));
  emojis.slice(0,14).forEach(function(e){
    var btn=document.createElement('button');btn.className='shelf-emoji';btn.textContent=e;
    btn.onclick=function(){insertEmoji(e);};
    shelf.appendChild(btn);
  });
  if(canManageComm(comm)){
    var addBtn=document.createElement('button');
    addBtn.style.cssText='background:rgba(0,212,255,.12);border:1px dashed #00d4ff;border-radius:7px;padding:3px 9px;cursor:pointer;font-size:.72rem;font-weight:900;color:#00d4ff;font-family:Nunito,sans-serif;flex-shrink:0;';
    addBtn.textContent='+ Emoji';
    addBtn.onclick=function(){showAddEmojiModal(comm);};
    shelf.appendChild(addBtn);
  }
}

function insertEmoji(e){
  var inp=document.getElementById('commInput');
  if(inp){inp.value=(inp.value||'')+e;inp.focus();}
}

function showAddEmojiModal(comm){
  var ex=document.getElementById('addEmojiModal');if(ex)ex.remove();
  var modal=document.createElement('div');modal.id='addEmojiModal';modal.className='modal-overlay';
  modal.innerHTML=
    '<div class="modal-box">'+
      '<div class="modal-title">✏️ Add Custom Emoji</div>'+
      '<input class="modal-input" id="emojiName" placeholder="Name (e.g. hype)">'+
      '<input class="modal-input" id="emojiChar" placeholder="Emoji character (e.g. 🔥)">'+
      '<div style="font-size:.72rem;color:var(--muted);margin-bottom:6px;">Or upload image (max 512KB):</div>'+
      '<button onclick="document.getElementById(\'emojiImgFile\').click()" style="width:100%;padding:8px;background:#13131c;border:1.5px dashed #2e2e3e;border-radius:9px;color:#7878a0;font-size:.8rem;font-weight:900;cursor:pointer;font-family:Nunito,sans-serif;margin-bottom:6px;">📁 Upload Image</button>'+
      '<input type="file" id="emojiImgFile" accept="image/*" style="display:none;" onchange="handleEmojiImg(this)">'+
      '<div id="emojiImgPrev" style="margin-bottom:6px;"></div>'+
      '<div class="modal-btns">'+
        '<button class="modal-btn primary" onclick="saveCustomEmoji(\''+comm.id+'\')">Save</button>'+
        '<button class="modal-btn secondary" onclick="closeModal(\'addEmojiModal\')">Cancel</button>'+
      '</div>'+
    '</div>';
  document.body.appendChild(modal);
}

var customEmojiImg=null;
function handleEmojiImg(inp){
  var file=inp.files[0];if(!file)return;
  if(file.size>524288){toast('Must be under 512KB!','#ff4757');return;}
  var r=new FileReader();
  r.onload=function(e){
    customEmojiImg=e.target.result;
    var p=document.getElementById('emojiImgPrev');
    if(p)p.innerHTML='<img src="'+e.target.result+'" style="width:36px;height:36px;object-fit:contain;border-radius:6px;border:1px solid #2e2e3e;">';
  };
  r.readAsDataURL(file);inp.value='';
}

function saveCustomEmoji(commId){
  var name=(document.getElementById('emojiName').value||'').trim().replace(/\s+/g,'_');
  var emoji=(document.getElementById('emojiChar').value||'').trim();
  if(!name){toast('Enter a name!','#ff4757');return;}
  if(!emoji&&!customEmojiImg){toast('Enter an emoji or upload an image!','#ff4757');return;}
  db.collection('communities').doc(commId).update({
    customEmojis:firebase.firestore.FieldValue.arrayUnion({name:name,emoji:emoji||':'+name+':',imageUrl:customEmojiImg||null})
  }).then(function(){
    customEmojiImg=null;closeModal('addEmojiModal');toast('Emoji added!');
    db.collection('communities').doc(commId).get().then(function(doc){
      if(doc.exists){currentComm=Object.assign({id:commId},doc.data());buildEmojiShelf(currentComm);}
    });
  });
}

// ══════════════════════════════════════════
//  MEMBERS PANEL
// ══════════════════════════════════════════
function buildMemberPanel(comm){
  var panel=document.getElementById('memberPanel');if(!panel)return;
  var members=comm.members||[];
  var groups={owner:[],admin:[],mod:[],member:[]};
  members.forEach(function(m){
    var r=m.commRole||'member';
    if(groups[r])groups[r].push(m);else groups.member.push(m);
  });
  panel.innerHTML='';
  function sec(roleId,label,color){
    var g=groups[roleId]||[];if(!g.length)return;
    var s=document.createElement('div');s.className='cm-sec';
    s.innerHTML='<div class="cm-sec-title" style="color:'+color+';">'+label+' ('+g.length+')</div>';
    g.forEach(function(m){
      var r=document.createElement('div');r.className='cm-member';
      r.innerHTML='<div class="cm-av">'+(m.pfp?'<img src="'+esc(m.pfp)+'" alt="">':esc(m.username[0].toUpperCase()))+'</div>'+
        '<div class="cm-name">@'+esc(m.username)+'</div>';
      s.appendChild(r);
    });
    panel.appendChild(s);
  }
  sec('owner','👑 Owner','#FFD700');
  sec('admin','🛡 Admins','#00d4ff');
  sec('mod','🔨 Mods','#8e24aa');
  sec('member','👥 Members','#7878a0');
}

function toggleMembers(){
  membersOpen=!membersOpen;
  var p=document.getElementById('memberPanel');if(p)p.classList.toggle('open',membersOpen);
}

// ══════════════════════════════════════════
//  LEAVE
// ══════════════════════════════════════════
function leaveComm(){
  if(!currentComm)return;
  if(currentComm.ownerUid===me.uid){toast('Owners cannot leave. Delete the community instead.','#ff4757');return;}
  if(!confirm('Leave '+currentComm.name+'?'))return;
  var newMembers=(currentComm.members||[]).filter(function(m){return m.uid!==me.uid;});
  db.collection('communities').doc(currentCommId).update({
    memberUids:firebase.firestore.FieldValue.arrayRemove(me.uid),
    memberCount:firebase.firestore.FieldValue.increment(-1),
    members:newMembers
  }).then(function(){closeCommView();toast('Left community.');loadComms();});
}

// ══════════════════════════════════════════
//  BAN
// ══════════════════════════════════════════
function banUser(commId,uid,username){
  if(!confirm('Ban @'+username+' from this community?'))return;
  db.collection('communities').doc(commId).get().then(function(doc){
    if(!doc.exists)return;
    var d=doc.data();
    var newMembers=(d.members||[]).filter(function(m){return m.uid!==uid;});
    db.collection('communities').doc(commId).update({
      memberUids:firebase.firestore.FieldValue.arrayRemove(uid),
      memberCount:firebase.firestore.FieldValue.increment(-1),
      members:newMembers,
      bannedUids:firebase.firestore.FieldValue.arrayUnion(uid)
    }).then(function(){
      toast('@'+username+' banned.');
      db.collection('users').doc(uid).collection('notifications').add({
        message:'You were banned from "'+d.name+'".',
        type:'warning',read:false,ts:firebase.firestore.FieldValue.serverTimestamp()
      });
    });
  });
}

// ══════════════════════════════════════════
//  SETTINGS PANEL
// ══════════════════════════════════════════
function openSettings(){
  if(!currentComm)return;
  var ex=document.getElementById('settingsPanel');if(ex){ex.remove();return;}
  var comm=currentComm;
  var panel=document.createElement('div');panel.id='settingsPanel';panel.className='settings-panel';

  panel.innerHTML=
    '<div class="sp-topbar">'+
      '<div style="font-weight:900;font-size:1rem;color:var(--accent);">⚙️ Manage: '+esc(comm.name)+'</div>'+
      '<button onclick="closeModal(\'settingsPanel\')" style="background:#2e2e3e;border:none;color:#e8e8f0;padding:7px 14px;border-radius:8px;cursor:pointer;font-family:Nunito,sans-serif;font-weight:900;">✕ Close</button>'+
    '</div>'+
    '<div class="sp-body">'+
      // Edit info
      '<div class="sp-section">'+
        '<div class="sp-section-title" style="color:var(--accent);">📝 Edit Community</div>'+
        '<input class="f-input" id="spName" value="'+esc(comm.name)+'" placeholder="Name">'+
        '<textarea class="f-input" id="spDesc" rows="2" style="resize:none;" placeholder="Description">'+esc(comm.description||'')+'</textarea>'+
        '<input class="f-input" id="spTag" value="'+esc(comm.gameTag||'')+'" placeholder="Game tag">'+
        '<button class="create-btn" onclick="saveCommInfo()">Save Changes</button>'+
      '</div>'+
      // Member roles
      '<div class="sp-section">'+
        '<div class="sp-section-title" style="color:#FFD700;">👥 Member Roles</div>'+
        '<div id="spMembers">'+buildMemberRolesHTML(comm)+'</div>'+
      '</div>'+
      // Banned
      '<div class="sp-section" style="border-color:#ff4757;">'+
        '<div class="sp-section-title" style="color:#ff4757;">🚫 Banned Users</div>'+
        '<div id="spBanned">'+buildBannedHTML(comm)+'</div>'+
      '</div>'+
      // Delete (owner only)
      (comm.ownerUid===me.uid?
      '<div class="sp-section" style="border-color:#ff4757;background:rgba(255,71,87,.06);">'+
        '<div class="sp-section-title" style="color:#ff4757;">⚠️ Danger Zone</div>'+
        '<button onclick="deleteComm()" style="width:100%;padding:10px;background:#ff4757;color:#fff;border:none;border-radius:9px;font-weight:900;cursor:pointer;font-family:Nunito,sans-serif;">🗑 Delete Community Forever</button>'+
      '</div>':'')+
    '</div>';

  document.body.appendChild(panel);
}

function buildMemberRolesHTML(comm){
  return(comm.members||[]).map(function(m){
    var opts=(comm.commRoles||[]).map(function(r){
      return'<option value="'+r.id+'"'+(m.commRole===r.id?' selected':'')+'>'+esc(r.name)+'</option>';
    }).join('');
    return'<div style="display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:8px 10px;margin-bottom:6px;">'+
      '<div style="width:28px;height:28px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.7rem;flex-shrink:0;overflow:hidden;">'+
        (m.pfp?'<img src="'+esc(m.pfp)+'" style="width:100%;height:100%;object-fit:cover;">':esc(m.username[0].toUpperCase()))+
      '</div>'+
      '<div style="flex:1;font-weight:900;font-size:.82rem;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">@'+esc(m.username)+'</div>'+
      '<select onchange="updateMemberRole(\''+comm.id+'\',\''+m.uid+'\',this.value)" style="background:#1a1a24;border:1px solid #2e2e3e;border-radius:7px;color:#e8e8f0;padding:4px 8px;font-family:Nunito,sans-serif;font-size:.76rem;font-weight:700;cursor:pointer;">'+opts+'</select>'+
    '</div>';
  }).join('');
}

function buildBannedHTML(comm){
  var banned=comm.bannedUids||[];
  if(!banned.length)return'<div style="color:var(--muted);font-size:.82rem;">No banned users.</div>';
  return banned.map(function(uid){
    return'<div style="display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:8px 10px;margin-bottom:6px;">'+
      '<div style="flex:1;font-size:.8rem;font-weight:700;color:#ff4757;word-break:break-all;">'+esc(uid)+'</div>'+
      '<button onclick="unbanUser(\''+comm.id+'\',\''+uid+'\')" style="background:#2ed573;color:#000;border:none;padding:5px 11px;border-radius:7px;font-weight:900;font-size:.74rem;cursor:pointer;font-family:Nunito,sans-serif;flex-shrink:0;">Unban</button>'+
    '</div>';
  }).join('');
}

function saveCommInfo(){
  var name=(document.getElementById('spName').value||'').trim();
  var desc=(document.getElementById('spDesc').value||'').trim();
  var tag=(document.getElementById('spTag').value||'').trim();
  if(!name){toast('Name required!','#ff4757');return;}
  db.collection('communities').doc(currentCommId).update({name:name,description:desc,gameTag:tag}).then(function(){
    currentComm.name=name;currentComm.description=desc;currentComm.gameTag=tag;
    var el=document.querySelector('.comm-topbar-name');if(el)el.textContent=name;
    toast('Saved!');loadComms();
  });
}

function updateMemberRole(commId,uid,newRole){
  db.collection('communities').doc(commId).get().then(function(doc){
    if(!doc.exists)return;
    var members=(doc.data().members||[]).map(function(m){
      return m.uid===uid?Object.assign({},m,{commRole:newRole}):m;
    });
    db.collection('communities').doc(commId).update({members:members}).then(function(){
      toast('Role updated!');
      if(currentComm&&currentComm.id===commId)currentComm.members=members;
    });
  });
}

function unbanUser(commId,uid){
  db.collection('communities').doc(commId).update({
    bannedUids:firebase.firestore.FieldValue.arrayRemove(uid)
  }).then(function(){
    toast('Unbanned.');
    db.collection('communities').doc(commId).get().then(function(doc){
      if(doc.exists){
        currentComm=Object.assign({id:commId},doc.data());
        var sp=document.getElementById('settingsPanel');
        if(sp){var b=document.getElementById('spBanned');if(b)b.innerHTML=buildBannedHTML(currentComm);}
      }
    });
  });
}

function deleteComm(){
  if(!confirm('Delete this community forever?'))return;
  if(!confirm('Final confirmation — this cannot be undone!'))return;
  db.collection('communities').doc(currentCommId).delete().then(function(){
    closeModal('settingsPanel');closeCommView();toast('Community deleted.');loadComms();
  });
}
</script>
</body>
