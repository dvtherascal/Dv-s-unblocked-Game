<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Dv's Unblocked Games</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root{--bg:#0f0f13;--surface:#1a1a24;--border:#2e2e3e;--accent:#00d4ff;--text:#e8e8f0;--muted:#7878a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;padding-top:56px;padding-bottom:70px;min-height:100vh;}
#bgWrap{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 2s;}
#bgWrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;transform:scale(1.2);}
.page{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:16px 14px 20px;}

.profile-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:22px 18px 18px;margin-bottom:16px;text-align:center;position:relative;}
.pfp-wrap{position:relative;display:inline-block;margin-bottom:12px;}
.pfp-circle{width:86px;height:86px;border-radius:50%;background:var(--accent);color:#000;font-size:2rem;font-weight:900;display:flex;align-items:center;justify-content:center;overflow:hidden;border:3px solid var(--accent);margin:0 auto;}
.pfp-circle img{width:100%;height:100%;object-fit:cover;}
.pfp-edit-btn{position:absolute;bottom:0;right:0;width:26px;height:26px;background:#FFD700;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;}
.username-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.uname{font-size:1.15rem;font-weight:900;}
.role-badge{font-size:.62rem;padding:2px 8px;border-radius:5px;font-weight:900;}
.user-since{font-size:.72rem;color:var(--muted);margin-bottom:10px;}

.desc-section{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);border-radius:10px;padding:10px 13px;margin-bottom:12px;text-align:left;}
.desc-label{font-size:.68rem;color:var(--accent);font-weight:900;margin-bottom:4px;}
.desc-text{font-size:.84rem;color:#ccc;line-height:1.5;min-height:20px;word-break:break-word;}
.desc-edit-area{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:.84rem;font-family:'Nunito',sans-serif;padding:8px 10px;resize:none;outline:none;margin-top:6px;}
.desc-edit-area:focus{border-color:var(--accent);}
.desc-btns{display:flex;gap:7px;margin-top:7px;}

.stats-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.stat-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 18px;text-align:center;flex:1;min-width:70px;}
.stat-num{font-size:1.3rem;font-weight:900;color:var(--accent);}
.stat-label{font-size:.66rem;color:var(--muted);font-weight:700;}

.edit-row{display:flex;gap:8px;margin-bottom:10px;}
.edit-inp{flex:1;padding:9px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:.86rem;font-family:'Nunito',sans-serif;outline:none;}
.edit-inp:focus{border-color:var(--accent);}
.action-btn{padding:9px 16px;border:none;border-radius:9px;font-weight:900;font-size:.82rem;cursor:pointer;font-family:'Nunito',sans-serif;}
.btn-accent{background:var(--accent);color:#000;}
.btn-danger{background:#ff4757;color:#fff;}
.btn-muted{background:#2e2e3e;color:#e8e8f0;}

.section-title{font-weight:900;font-size:.9rem;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.history-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.hist-card{border-radius:10px;overflow:hidden;border:1.5px solid var(--border);cursor:pointer;transition:border-color .15s;}
.hist-card:hover{border-color:var(--accent);}
.hist-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.hist-name{font-size:.7rem;font-weight:900;padding:5px 7px;background:var(--surface);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.pfp-menu{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:8px;z-index:50;min-width:170px;box-shadow:0 8px 28px rgba(0,0,0,.7);}
.pfp-menu-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:.84rem;font-weight:700;color:var(--text);}
.pfp-menu-btn:hover{background:rgba(255,255,255,.07);}
.pfp-menu-btn.danger{color:#ff4757;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:11px 20px;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.86rem;z-index:9999;max-width:300px;width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;transition:opacity .4s;background:var(--surface);border:2px solid var(--accent);color:var(--text);}
</style>
</head>
<body>
<div id="bgWrap">
  <iframe src="https://www.youtube.com/embed/Bj3qepNUFyE?autoplay=1&mute=1&loop=1&playlist=Bj3qepNUFyE&controls=0&showinfo=0&rel=0&modestbranding=1" allow="autoplay;fullscreen" allowfullscreen></iframe>
</div>

<nav class="navbar" style="position:fixed;top:0;left:0;right:0;z-index:200;">
  <div class="nav-left">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="#FFD700"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
    <span class="nav-brand">Dv's Unblocked Games</span>
  </div>
  <div class="nav-right">
    <div id="navAvatar" style="width:32px;height:32px;border-radius:50%;background:var(--accent);color:#000;font-weight:900;display:flex;align-items:center;justify-content:center;font-size:.82rem;overflow:hidden;">?</div>
    <span id="navUsername" style="font-size:.82rem;font-weight:700;color:var(--muted);">—</span>
  </div>
</nav>

<nav class="bnav" style="position:fixed;bottom:0;left:0;right:0;z-index:200;">
  <a href="index.html" class="bnav-btn"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span></a>
  <a href="friends.html" class="bnav-btn"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg><span>Friends</span></a>
  <a href="groupchats.html" class="bnav-btn"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg><span>Groups</span></a>
  <a href="reports.html" class="bnav-btn"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 9h-2V5h2v6zm0 4h-2v-2h2v2z"/></svg><span>Reports</span></a>
  <a href="profile.html" class="bnav-btn active"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg><span>Profile</span></a>
  <a href="credits.html" class="bnav-btn"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><span>Credits</span></a>
</nav>

<div class="page" id="mainPage" style="display:none;">

  <!-- PROFILE CARD -->
  <div class="profile-card">
    <div class="pfp-wrap">
      <div class="pfp-circle" id="pfpCircle">?</div>
      <button class="pfp-edit-btn" onclick="togglePfpMenu()" title="Change picture">✏️</button>
      <div class="pfp-menu" id="pfpMenu" style="display:none;">
        <div class="pfp-menu-btn" onclick="triggerPfpUpload()">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>Upload Photo
        </div>
        <div class="pfp-menu-btn danger" onclick="removePfp()">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>Remove Photo
        </div>
      </div>
    </div>
    <input type="file" id="pfpInput" accept="image/*" style="display:none;" onchange="handlePfpUpload(this)">

    <div class="username-row">
      <span class="uname" id="profileUsername">—</span>
      <span class="role-badge" id="profileRoleBadge" style="display:none;"></span>
    </div>
    <div class="user-since" id="profileSince">Member since —</div>

    <!-- DESCRIPTION -->
    <div class="desc-section">
      <div class="desc-label">📝 About Me</div>
      <div class="desc-text" id="descText">No description yet.</div>
      <div id="descEditWrap" style="display:none;">
        <textarea class="desc-edit-area" id="descInput" rows="3" maxlength="200" placeholder="Tell people about yourself... (max 200 chars)"></textarea>
        <div style="font-size:.66rem;color:var(--muted);text-align:right;margin-top:2px;" id="descCharCount">0/200</div>
        <div class="desc-btns">
          <button class="action-btn btn-accent" style="flex:1;" onclick="saveDescription()">Save</button>
          <button class="action-btn btn-muted" style="flex:1;" onclick="cancelDescEdit()">Cancel</button>
        </div>
      </div>
      <button id="descEditBtn" onclick="startDescEdit()" style="background:none;border:none;color:var(--accent);font-size:.74rem;font-weight:900;cursor:pointer;margin-top:6px;font-family:'Nunito',sans-serif;padding:0;">✏️ Edit description</button>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="statGames">0</div><div class="stat-label">Games Played</div></div>
      <div class="stat-box"><div class="stat-num" id="statFriends">0</div><div class="stat-label">Friends</div></div>
      <div class="stat-box"><div class="stat-num" id="statUnique">0</div><div class="stat-label">Unique Games</div></div>
    </div>

    <!-- EDIT NAME -->
    <div style="margin-bottom:10px;">
      <div style="font-size:.74rem;color:var(--muted);font-weight:700;margin-bottom:5px;">Display Name</div>
      <div class="edit-row">
        <input class="edit-inp" id="nameInput" placeholder="Display name...">
        <button class="action-btn btn-accent" onclick="saveName()">Save</button>
      </div>
    </div>

    <!-- SIGN OUT -->
    <button class="action-btn btn-danger" style="width:100%;padding:11px;" onclick="doSignOut()">
      <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:5px;"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      Sign Out
    </button>
  </div>

  <!-- PLAY HISTORY -->
  <div id="historySection" style="display:none;">
    <div class="section-title">
      <svg width="16" height="16" fill="#FFD700" viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      Play History
    </div>
    <div class="history-grid" id="historyGrid"></div>
  </div>

</div>

<div id="loadingPage" style="display:flex;align-items:center;justify-content:center;height:60vh;color:var(--muted);font-size:.9rem;font-weight:700;">Loading profile...</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
var me = null;
var unsubProfile = null;
var ROLE_COLORS = {owner:'#FFD700',developer:'#e040fb',admin:'#00d4ff',mod:'#8e24aa',helper:'#43a047'};
var ROLE_LABELS = {owner:'OWNER',developer:'DEV',admin:'ADMIN',mod:'MOD',helper:'HELPER'};

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,color){
  color=color||'#00d4ff';
  var t=document.createElement('div');t.className='toast';t.style.borderColor=color;t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){if(t.parentNode)t.remove();},400);},3000);
}
function getUserRole(u){
  if(!u)return'user';
  if(u.role==='owner'||u.isOwner)return'owner';
  if(u.role==='developer'||u.isDeveloper)return'developer';
  if(u.role==='admin'||u.isAdmin)return'admin';
  if(u.role==='mod'||u.isMod)return'mod';
  if(u.role==='helper'||u.isHelper)return'helper';
  return'user';
}

auth.onAuthStateChanged(function(firebaseUser){
  if(!firebaseUser){
    var saved=null;
    try{var uid=localStorage.getItem('dvs_uid');var ts=parseInt(localStorage.getItem('dvs_ts')||'0');if(uid&&Date.now()-ts<48*3600*1000)saved=uid;}catch(e){}
    if(saved){loadProfile(saved);}else{location.href='index.html';}
    return;
  }
  loadProfile(firebaseUser.uid);
});

function loadProfile(uid){
  if(unsubProfile)unsubProfile();
  unsubProfile=db.collection('users').doc(uid).onSnapshot(function(doc){
    if(!doc.exists){location.href='index.html';return;}
    me=Object.assign({uid:uid},doc.data());
    renderProfile(me);
    document.getElementById('loadingPage').style.display='none';
    document.getElementById('mainPage').style.display='block';
    var bg=document.getElementById('bgWrap');if(bg)bg.style.opacity='0.18';
  });
}

function renderProfile(u){
  // Nav
  var av=document.getElementById('navAvatar');
  if(av)av.innerHTML=u.pfp?'<img src="'+u.pfp+'" style="width:100%;height:100%;object-fit:cover;">':u.username[0].toUpperCase();
  var un=document.getElementById('navUsername');if(un)un.textContent=u.username;

  // PFP
  var pfp=document.getElementById('pfpCircle');
  if(pfp)pfp.innerHTML=u.pfp?'<img src="'+u.pfp+'" alt="pfp">':u.username[0].toUpperCase();

  // Username + role
  var unEl=document.getElementById('profileUsername');if(unEl)unEl.textContent='@'+(u.username||'?');
  var role=getUserRole(u);
  var badge=document.getElementById('profileRoleBadge');
  if(badge){
    if(role!=='user'){
      badge.style.display='inline-block';
      badge.style.background=ROLE_COLORS[role]||'#aaa';
      badge.style.color=(role==='developer'||role==='mod')?'#fff':'#000';
      badge.textContent=ROLE_LABELS[role]||role.toUpperCase();
    }else{badge.style.display='none';}
  }
  var sinceEl=document.getElementById('profileSince');if(sinceEl)sinceEl.textContent='Member since '+(u.since||'?');

  // Description
  var descText=document.getElementById('descText');
  if(descText)descText.textContent=u.description&&u.description.trim()?u.description:'No description yet.';
  var descInput=document.getElementById('descInput');
  if(descInput)descInput.value=u.description||'';

  // Stats
  var sg=document.getElementById('statGames');if(sg)sg.textContent=u.gamesPlayed||0;
  var sf=document.getElementById('statFriends');if(sf)sf.textContent=(u.friends||[]).length;
  var su=document.getElementById('statUnique');if(su)su.textContent=(u.history||[]).length;

  // Name input
  var ni=document.getElementById('nameInput');if(ni)ni.value=u.name||u.username||'';

  // History
  var hist=u.history||[];
  var sec=document.getElementById('historySection');
  var grid=document.getElementById('historyGrid');
  if(sec&&grid){
    if(hist.length){
      sec.style.display='block';grid.innerHTML='';
      hist.forEach(function(h){
        var card=document.createElement('div');card.className='hist-card';
        card.innerHTML='<img class="hist-thumb" src="'+escHtml(h.thumb||'')+'" alt="'+escHtml(h.name||'')+'" onerror="this.style.display=\'none\'"><div class="hist-name">'+escHtml(h.name||'?')+'</div>';
        grid.appendChild(card);
      });
    }else{sec.style.display='none';}
  }
}

// ── DESCRIPTION ──
function startDescEdit(){
  document.getElementById('descEditWrap').style.display='block';
  document.getElementById('descEditBtn').style.display='none';
  document.getElementById('descText').style.display='none';
  var inp=document.getElementById('descInput');
  inp.value=me.description||'';
  updateDescCount();
  inp.focus();
}
function cancelDescEdit(){
  document.getElementById('descEditWrap').style.display='none';
  document.getElementById('descEditBtn').style.display='inline-block';
  document.getElementById('descText').style.display='block';
}
function updateDescCount(){
  var inp=document.getElementById('descInput');
  var count=document.getElementById('descCharCount');
  if(inp&&count)count.textContent=(inp.value||'').length+'/200';
}
function saveDescription(){
  var inp=document.getElementById('descInput');
  var desc=(inp.value||'').trim().substring(0,200);
  db.collection('users').doc(me.uid).update({description:desc}).then(function(){
    me.description=desc;
    var dt=document.getElementById('descText');
    if(dt)dt.textContent=desc||'No description yet.';
    cancelDescEdit();
    showToast('Description saved!');
  }).catch(function(e){showToast('Error: '+e.message,'#ff4757');});
}

// ── PFP ──
function togglePfpMenu(){
  var m=document.getElementById('pfpMenu');
  if(m)m.style.display=m.style.display==='none'?'block':'none';
}
function triggerPfpUpload(){
  document.getElementById('pfpMenu').style.display='none';
  document.getElementById('pfpInput').click();
}
function handlePfpUpload(inp){
  var file=inp.files[0];if(!file)return;
  if(file.size>2*1024*1024){showToast('Image must be under 2MB!','#ff4757');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    db.collection('users').doc(me.uid).update({pfp:e.target.result}).then(function(){
      showToast('Profile picture updated!');
    });
  };
  reader.readAsDataURL(file);
  inp.value='';
}
function removePfp(){
  document.getElementById('pfpMenu').style.display='none';
  db.collection('users').doc(me.uid).update({pfp:null}).then(function(){showToast('Profile picture removed.');});
}

// ── SAVE NAME ──
function saveName(){
  var name=(document.getElementById('nameInput').value||'').trim();
  if(!name){showToast('Enter a name!','#ff4757');return;}
  db.collection('users').doc(me.uid).update({name:name}).then(function(){
    me.name=name;showToast('Name updated!');
  });
}

// ── SIGN OUT ──
function doSignOut(){
  try{localStorage.removeItem('dvs_uid');localStorage.removeItem('dvs_ts');}catch(e){}
  auth.signOut().then(function(){location.href='index.html';});
}

// Close pfp menu on outside click
document.addEventListener('click',function(e){
  var menu=document.getElementById('pfpMenu');
  var btn=document.querySelector('.pfp-edit-btn');
  if(menu&&btn&&!menu.contains(e.target)&&!btn.contains(e.target))menu.style.display='none';
});
// Desc char counter
document.addEventListener('input',function(e){if(e.target&&e.target.id==='descInput')updateDescCount();});
</script>
</body>
</html>
